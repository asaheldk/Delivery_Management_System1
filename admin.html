    @media(max-width:760px){.top-main{padding-left:13px;padding-right:13px}.account-copy{display:none}.tabs{padding-left:10px;padding-right:10px}.wrap{padding:16px 11px calc(28px + env(safe-area-inset-bottom))}.page-head{align-items:stretch;flex-direction:column}.actions{display:grid;grid-template-columns:1fr 1fr}.date{width:100%}.summary{grid-template-columns:repeat(2,1fr);gap:8px}.metric{padding:14px}.metric strong{font-size:25px}.panel-head{align-items:stretch;flex-direction:column}.filters{display:grid;grid-template-columns:1fr 120px}.search{width:100%}.table-scroll{display:none}.mobile-cards{display:grid;gap:9px;padding:10px}.mobile-card{padding:14px;border:1px solid var(--line);border-radius:16px;background:#fff}.mobile-card .row-actions{display:grid;grid-template-columns:1fr 1fr;margin-top:11px}.board{grid-template-columns:1fr 1fr;padding:10px}.grid-2{grid-template-columns:1fr}.card-grid{grid-template-columns:1fr;padding:10px}.health{grid-template-columns:1fr 1fr;padding:10px}.role-matrix{grid-template-columns:1fr 1fr;padding:10px}.modal{align-items:end;padding:max(7px,env(safe-area-inset-top)) 0 0}.modal-card,.modal-card.wide{width:100%;max-height:calc(100dvh - max(7px,env(safe-area-inset-top)));border-radius:23px 23px 0 0}.form-grid{grid-template-columns:1fr}.wide-field{grid-column:auto}}
    @media(max-width:430px){.brand small{display:none}.board{grid-template-columns:1fr}.role-matrix{grid-template-columns:1fr}.health{grid-template-columns:1fr}.form-actions{grid-template-columns:1fr}.close-banner{align-items:stretch;flex-direction:column}}

<body>
  <section id="loginView" class="login">
    <form id="loginForm" class="login-card">
      <div class="mark">管</div><h1>배송 통합 관리자 V2</h1><p>20개 호차의 출차·거래처·긴급 발주·품목·회계·권한을 한곳에서 관리합니다.</p>
      <label class="field"><span>관리자 이메일</span><input class="control" name="email" type="email" autocomplete="username" required></label>
      <label class="field"><span>비밀번호</span><input class="control" name="password" type="password" autocomplete="current-password" required></label>
      <button class="btn primary full" type="submit">관리자 로그인</button><div id="loginMessage" class="message"></div>
    </form>
  </section>
  <div id="app" class="hidden">
    <header class="top">
      <div class="top-main"><div class="brand"><span class="brand-logo">🚚</span><div><strong>배송 관제</strong><small>OPERATIONS CENTER V2</small></div></div><div class="account"><div class="account-copy"><strong id="adminName">관리자</strong><small id="adminRole"></small></div><button id="logoutButton" class="logout" type="button">로그아웃</button></div></div>
      <nav id="tabs" class="tabs"></nav>
    </header>
    <main id="content" class="wrap"></main>
  </div>
  <div id="modal" class="modal hidden"></div><div id="toast" class="toast hidden"></div>
  <script>
  (()=>{"use strict";
    const $=s=>document.querySelector(s), esc=v=>String(v??"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"})[c]);
    const localDate=(o=0)=>{const d=new Date();d.setDate(d.getDate()+o);return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10)},money=n=>new Intl.NumberFormat("ko-KR").format(Math.round(Number(n)||0)),fmt=v=>v?new Date(v).toLocaleString("ko-KR"):"-";
    const ADMIN_ROLES=["admin","super_admin","dispatch_manager","accounting_manager","field_manager","viewer"];
    const roleLabel={admin:"전체 관리자(기존)",super_admin:"최고 관리자",dispatch_manager:"배차 관리자",accounting_manager:"회계 관리자",field_manager:"현장 관리자",viewer:"조회 전용",driver:"배송원"};
    const rolePerm={admin:["*"],super_admin:["*"],dispatch_manager:["driver_write","account_manage","dispatch_write","store_write","store_secret","urgent_write","incident_write","departure_write","report_read"],accounting_manager:["product_write","accounting_write","report_read"],field_manager:["store_write","urgent_write","incident_write","departure_write","report_read"],viewer:["report_read"]};
    const tabs=[
      ["dashboard","오늘 관제","report_read"],["shipments","출고량 분석","report_read"],["drivers","배송원·출차","driver_write"],["stores","거래처·인수인계","store_write"],["urgent","긴급·오류","urgent_write"],["products","품목·가격","product_write"],["accounting","회계·보고","report_read"],["access","권한·감사","role_manage"]
    ];
    let client,session,me,view="dashboard",workDate=localDate(1),search="",shipmentVehicle="all",shipmentStatus="all",poll;
    let data={profiles:[],statuses:[],snapshots:[],assignments:[],workday:null,departures:[],stores:[],urgent:[],incidents:[],products:[],prices:[],invoices:[],receivables:[],logs:[]};
    const can=p=>p==="report_read"||rolePerm[me?.role]?.includes("*")||rolePerm[me?.role]?.includes(p);
    function toast(msg,bad=false){const e=$("#toast");e.textContent=msg;e.classList.toggle("bad",bad);e.classList.remove("hidden");clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.add("hidden"),3300)}
    function online(s){return s?.last_sync_at&&Date.now()-new Date(s.last_sync_at).getTime()<130000}function statusOf(id){return data.statuses.find(x=>x.driver_id===id)||{work_state:"not_started",delivery_total:0,delivery_completed:0,tank_total:0,tank_loaded:0,box_total:0,box_checked:0,urgent_pending:0,issue_count:0}}
    function stateLabel(v){return({not_started:"미시작",working:"출차 준비",departure_ready:"점검 완료",delivering:"배송 중",completed:"배송 완료"})[v]||"미시작"}function roleBadge(r){return `<span class="badge ${r==="super_admin"||r==="admin"?"purple":""}">${esc(roleLabel[r]||r)}</span>`}
    async function getConfig(){try{const r=await fetch("/api/config",{cache:"no-store"});return r.ok?await r.json():{configured:false}}catch{return{configured:false}}}
    async function api(path,body){const r=await fetch(path,{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${session.access_token}`},body:JSON.stringify(body)}),j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.error||"요청을 처리하지 못했습니다.");return j}
    async function boot(){const cfg=await getConfig();if(!cfg.configured||!window.supabase?.createClient){$("#loginMessage").textContent="Vercel 환경변수와 Supabase 설정을 확인해 주세요.";return}client=window.supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey,{auth:{persistSession:true,autoRefreshToken:true}});const {data:s}=await client.auth.getSession();if(s.session)await accept(s.session).catch(e=>$("#loginMessage").textContent=e.message)}
    async function accept(s){session=s;const {data:p,error}=await client.from("profiles").select("*").eq("id",s.user.id).maybeSingle();if(error||!p?.active||!ADMIN_ROLES.includes(p.role)){await client.auth.signOut();throw new Error("관리자 권한이 없는 계정입니다.")}me=p;$("#loginView").classList.add("hidden");$("#app").classList.remove("hidden");$("#adminName").textContent=p.full_name;$("#adminRole").textContent=roleLabel[p.role];renderTabs();await loadAll();clearInterval(poll);poll=setInterval(loadAll,30000)}
    function visibleTabs(){return tabs.filter(([id,,p])=>id==="dashboard"||me?.role==="viewer"||can(p)||(id==="access"&&can("role_manage")))}
    function renderTabs(){if(!visibleTabs().some(x=>x[0]===view))view="dashboard";$("#tabs").innerHTML=visibleTabs().map(([id,label])=>`<button class="tab ${id===view?"active":""}" data-view="${id}" type="button">${label}${id==="urgent"&&data.urgent.filter(x=>["new","acknowledged","loaded"].includes(x.status)).length?`<span class="count">${data.urgent.filter(x=>["new","acknowledged","loaded"].includes(x.status)).length}</span>`:""}</button>`).join("")}
    async function query(table,select="*",builder=x=>x){const r=await builder(client.from(table).select(select));if(r.error){console.warn(table,r.error.message);return[]}return r.data||[]}
    async function loadAll(){if(!client||!session)return;const d=workDate;
      const results=await Promise.all([
        query("profiles"),query("driver_daily_status","*",q=>q.eq("work_date",d)),query("driver_state_snapshots","driver_id,work_date,payload,updated_at",q=>q.eq("work_date",d)),query("vehicle_assignments","*",q=>q.order("created_at",{ascending:false}).limit(500)),query("workday_controls","*",q=>q.eq("work_date",d)),query("departure_checks","*",q=>q.eq("work_date",d)),query("stores","id,store_code,name,address,phone,contact_name,assigned_driver_id,assigned_vehicle,delivery_order,preferred_time,entry_method,placement,prohibited,parking_note,handover_note,photo_urls,active,updated_by,created_at,updated_at",q=>q.order("assigned_vehicle").order("delivery_order")),query("urgent_orders","*",q=>q.eq("work_date",d).order("created_at",{ascending:false})),query("incident_reports","*",q=>q.eq("work_date",d).order("created_at",{ascending:false})),query("products","*",q=>q.order("category").order("name")),query("product_prices","*",q=>q.order("effective_from",{ascending:false})),query("invoice_records","*",q=>q.eq("work_date",d).order("created_at",{ascending:false})),query("receivable_payments","*",q=>q.eq("work_date",d).order("created_at",{ascending:false})),query("activity_logs","*",q=>q.order("created_at",{ascending:false}).limit(300))
      ]);
      [data.profiles,data.statuses,data.snapshots,data.assignments,,,,data.urgent,data.incidents,data.products,data.prices,data.invoices,data.receivables,data.logs]=results;data.workday=results[4][0]||null;data.departures=results[5];data.stores=results[6];renderTabs();render()}
    function pageHead(title,desc,buttons=""){return `<section class="page-head"><div><h1>${title}</h1><p>${desc}</p></div><div class="actions no-print"><input id="workDate" class="control date" type="date" value="${workDate}">${buttons}</div></section>`}
    function metrics(items){return `<section class="summary">${items.map(([a,b,c=""])=>`<article class="metric ${c}"><small>${a}</small><strong>${b}</strong><i></i></article>`).join("")}</section>`}
    function panel(title,desc,body,tools=""){return `<section class="panel"><header class="panel-head"><div><h2>${title}</h2><p>${desc}</p></div>${tools}</header>${body}</section>`}

        if(a==="urgent-status"){const x=data.urgent.find(x=>String(x.id)===id),next=prompt("상태를 입력하세요: new / acknowledged / loaded / delivered / impossible / cancelled",x.status);if(!next||!["new","acknowledged","loaded","delivered","impossible","cancelled"].includes(next))return;const row={status:next,updated_at:new Date().toISOString()};if(next==="acknowledged")row.acknowledged_at=new Date().toISOString();if(next==="loaded")row.loaded_at=new Date().toISOString();if(next==="delivered")row.delivered_at=new Date().toISOString();if(next==="impossible")row.impossible_reason=prompt("처리 불가 사유",x.impossible_reason||"")||"";const {error}=await client.from("urgent_orders").update(row).eq("id",id);if(error)throw error;toast("긴급 발주 상태를 변경했습니다.");return loadAll()}
        if(a==="incident-manage"){const x=data.incidents.find(x=>String(x.id)===id),resolution=prompt("조치 내용을 입력하세요.",x.resolution||"");if(resolution===null)return;const status=prompt("상태: reported / checking / resolved / closed",x.status);if(!["reported","checking","resolved","closed"].includes(status))return;const {error}=await client.from("incident_reports").update({resolution,status,updated_at:new Date().toISOString()}).eq("id",id);if(error)throw error;toast("오류 조치 기록을 저장했습니다.");return loadAll()}
        if(a==="store-secret"){const x=data.stores.find(x=>x.id===id),r=await api("/api/admin/store-secret",{action:"get",storeId:id}),next=prompt(`${x.name} 출입 비밀번호·출입코드\n열람 기록이 남습니다. 수정 후 확인을 누르세요.`,r.value||"");if(next===null)return;await api("/api/admin/store-secret",{action:"set",storeId:id,value:next});return toast("보안 출입정보를 저장했습니다.")}
        if(a==="password-reset"){const p=prompt("새 임시 비밀번호를 8자리 이상 입력하세요.");if(!p)return;await api("/api/admin/reset-password",{driverId:$("#driverForm").dataset.id,password:p});return toast("임시 비밀번호를 변경했습니다.")}
        if(a==="invoice-cancel"){const x=data.invoices.find(x=>x.id===id),reason=prompt("취소 사유를 입력하세요.");if(!reason)return;const {error}=await client.from("invoice_records").update({status:"cancelled",revision_reason:reason,updated_at:new Date().toISOString()}).eq("id",id);if(error)throw error;toast("거래명세 취소 이력을 보존했습니다.");return loadAll()}
        if(a==="price-new"){const p=data.products.find(x=>x.id===id),sid=prompt(`거래처별 단가를 등록합니다.\n거래처 코드 또는 이름을 입력하세요.`),store=data.stores.find(s=>s.store_code===sid||s.name===sid);if(!store)return toast("거래처를 찾지 못했습니다.",true);const price=Number(prompt(`${store.name}의 ${p.name} 단가`,p.base_price));if(!Number.isFinite(price)||price<0)return;const {error}=await client.from("product_prices").insert({product_id:p.id,store_id:store.id,unit_price:price,fillet_fee_per_kg:p.fillet_fee_per_kg,effective_from:workDate,created_by:me.id});if(error)throw error;toast("거래처별 단가를 저장했습니다.");return loadAll()}
      }catch(err){toast(err.message||"처리하지 못했습니다.",true)}});
    document.addEventListener("input",e=>{if(e.target.id==="searchInput"){search=e.target.value;render()}});document.addEventListener("change",e=>{if(e.target.id==="workDate"){workDate=e.target.value;loadAll()}if(e.target.id==="shipmentVehicleFilter"){shipmentVehicle=e.target.value;render()}if(e.target.id==="shipmentStatusFilter"){shipmentStatus=e.target.value;render()}if(e.target.closest("#urgentForm")&&e.target.name==="store_id"){const o=e.target.selectedOptions[0];e.target.form.assigned_vehicle.value=o?.dataset.vehicle||""}if(e.target.closest("#invoiceForm")&&e.target.name==="store_id"){const o=e.target.selectedOptions[0];e.target.form.vehicle_number.value=o?.dataset.vehicle||""}});
    document.addEventListener("submit",async e=>{e.preventDefault();const f=e.target,m=f.querySelector("#formMessage"),fd=Object.fromEntries(new FormData(f));if(m)m.textContent="저장 중입니다.";try{
      if(f.id==="loginForm"){const {data:s,error}=await client.auth.signInWithPassword({email:fd.email.trim(),password:fd.password});if(error)throw error;await accept(s.session);return}
      if(f.id==="driverForm"){if(f.dataset.id)await api("/api/admin/update-driver",{driverId:f.dataset.id,fullName:fd.fullName,phone:fd.phone,vehicleNumber:Number(fd.vehicleNumber),active:fd.active==="true",note:fd.note});else await api("/api/admin/create-driver",fd)}
      if(f.id==="storeForm")await saveStore(f);
      if(f.id==="urgentForm"){const o=f.store_id.selectedOptions[0],store=data.stores.find(s=>s.id===fd.store_id),row={work_date:workDate,store_id:fd.store_id,store_name:o?.dataset.name||store?.name||"",assigned_driver_id:store?.assigned_driver_id||null,assigned_vehicle:Number(fd.assigned_vehicle),item_summary:fd.item_summary.trim(),quantity_summary:fd.quantity_summary.trim(),note:fd.note.trim(),priority:fd.priority,updated_at:new Date().toISOString()};const r=f.dataset.id?await client.from("urgent_orders").update(row).eq("id",f.dataset.id):await client.from("urgent_orders").insert({...row,status:"new",created_by:me.id});if(r.error)throw r.error}
      if(f.id==="productForm"){const row={product_code:fd.product_code.trim(),name:fd.name.trim(),category:fd.category,unit:fd.unit,origin_country:fd.origin_country.trim(),base_price:Number(fd.base_price),fillet_fee_per_kg:Number(fd.fillet_fee_per_kg||0),default_band_color:fd.default_band_color.trim(),effective_from:fd.effective_from,effective_to:fd.effective_to||null,active:fd.active==="true",updated_by:me.id,updated_at:new Date().toISOString()};const r=f.dataset.id?await client.from("products").update(row).eq("id",f.dataset.id):await client.from("products").insert(row);if(r.error)throw r.error}
      if(f.id==="invoiceForm"){const old=data.invoices.find(x=>x.id===f.dataset.id),store=data.stores.find(s=>s.id===fd.store_id),subtotal=Number(fd.subtotal||0),fee=Number(fd.fillet_fee||0),prev=Number(fd.previous_balance||0),received=Number(fd.payment_received||0),row={work_date:workDate,invoice_no:fd.invoice_no.trim(),store_id:fd.store_id,store_name:store?.name||"",vehicle_number:Number(fd.vehicle_number)||store?.assigned_vehicle||null,subtotal,fillet_fee:fee,previous_balance:prev,payment_received:received,remaining_balance:prev+subtotal+fee-received,status:old?"revised":"issued",revision_no:old?Math.max(...data.invoices.filter(x=>x.invoice_no===old.invoice_no).map(x=>x.revision_no))+1:1,replaces_invoice_id:old?.id||null,revision_reason:fd.revision_reason||"",created_by:me.id};const {error}=await client.from("invoice_records").insert(row);if(error)throw error;await client.from("receivable_payments").insert({work_date:workDate,store_id:fd.store_id,store_name:store?.name||"",previous_balance:prev,payment_received:received,remaining_balance:row.remaining_balance,note:old?`명세 ${row.invoice_no} 수정 ${row.revision_no}차`:`명세 ${row.invoice_no}`,created_by:me.id})}
      if(f.id==="staffForm"){if(f.dataset.id)await api("/api/admin/update-role",{profileId:f.dataset.id,role:fd.role,active:fd.active==="true"});else await api("/api/admin/create-staff",fd)}
      $("#modal").classList.add("hidden");toast("저장했습니다.");await loadAll()
    }catch(err){if(m)m.textContent=err.message||"저장하지 못했습니다.";else toast(err.message,true)}});
    $("#loginForm").addEventListener("submit",()=>{});$("#logoutButton").addEventListener("click",async()=>{clearInterval(poll);await client.auth.signOut();location.reload()});boot();
  })();
  </script>
