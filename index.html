<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수산물 물류 시스템 - 발주처</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; }
    </style>
</head>
<body class="bg-[#f3f4f6] text-[#1e293b] antialiased pb-28">

    <header class="bg-[#0f172a] text-white px-6 py-5 shadow-md sticky top-0 z-50 flex justify-between items-center border-b border-slate-800">
        <div class="flex flex-col">
            <div class="flex items-center space-x-2">
                <span id="sync-indicator" class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></span>
                <h1 id="brand-logo" class="text-lg font-black tracking-wider text-slate-100">FISH-NET LOGISTICS</h1>
            </div>
            <span id="sync-code-text" class="text-[11px] text-slate-400 font-bold mt-0.5">🟢 모바일 발주 시스템</span>
        </div>
        <button onclick="toggleView('settings')" class="bg-slate-800 hover:bg-slate-700 text-slate-300 text-sm font-bold px-4 py-2.5 rounded-xl transition border border-slate-700/60">⚙️ 채널 설정</button>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-5">
        <section id="view-settings" class="hidden bg-white p-6 rounded-3xl shadow-xl border border-slate-200/60 space-y-5">
            <div class="border-b border-slate-100 pb-3">
                <h2 class="text-base font-black text-slate-900">⚙️ 시스템 설정</h2>
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-black text-slate-600">🔗 연동 코드 (배송원과 동일해야 함)</label>
                <input id="input-sync-code" type="text" value="1" class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-xl text-base font-bold outline-none">
            </div>
            <button onclick="updateSettingsMaster()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl text-base font-black transition">설정 저장</button>
        </section>

        <section id="view-owner" class="bg-white p-6 rounded-3xl shadow-xl border border-slate-200/60 space-y-6">
            <div>
                <h2 class="text-xl font-black text-slate-900 tracking-tight">발주 품목 등록</h2>
                <p class="text-sm text-slate-400 font-medium mt-0.5">항목을 입력하시면 담당 배송원에게 실시간 전송됩니다.</p>
            </div>
            
            <div class="space-y-5">
                <div class="bg-slate-50 p-5 rounded-2xl border-2 border-slate-100 space-y-4 shadow-inner">
                    <p class="text-xs font-black text-blue-600 tracking-wider uppercase">📍 1. 기본 배송지 및 납품 정보</p>
                    
                    <div class="space-y-1.5">
                        <label class="block text-base font-black text-slate-700">📅 납품 요청 날짜</label>
                        <input id="order-date" type="date" class="w-full p-4 bg-white border-2 border-slate-200 rounded-xl text-base font-bold outline-none text-center">
                    </div>

                    <div class="space-y-1.5">
                        <label class="block text-base font-black text-slate-700">점포 상호 이름</label>
                        <select id="sel-store" onchange="handleSelectChange(this, 'input-store')" class="w-full p-4 bg-white border-2 border-slate-200 rounded-xl text-base font-bold outline-none">
                            <option value="자갈치상회">자갈치상회</option>
                            <option value="영도수산">영도수산</option>
                            <option value="해운대대게">해운대대게</option>
                            <option value="custom">✍️ 직접 입력</option>
                        </select>
                        <input id="input-store" type="text" placeholder="상호명을 입력하세요" class="hidden w-full p-4 border-2 border-blue-200 rounded-xl text-base bg-blue-50/20 outline-none mt-2 font-bold">
                    </div>

                    <div class="space-y-1.5">
                        <label class="block text-base font-black text-slate-700">연락처</label>
                        <select id="sel-phone" onchange="handleSelectChange(this, 'input-phone')" class="w-full p-4 bg-white border-2 border-slate-200 rounded-xl text-base font-bold outline-none">
                            <option value="010-1234-5678">010-1234-5678</option>
                            <option value="010-9876-5432">010-9876-5432</option>
                            <option value="custom">✍️ 직접 입력</option>
                        </select>
                        <input id="input-phone" type="text" placeholder="연락처를 입력하세요" class="hidden w-full p-4 border-2 border-blue-200 rounded-xl text-base bg-blue-50/20 outline-none mt-2 font-bold">
                    </div>

                    <div class="space-y-1.5">
                        <label class="block text-base font-black text-slate-700">배송 주소</label>
                        <select id="sel-address" onchange="handleSelectChange(this, 'input-address')" class="w-full p-4 bg-white border-2 border-slate-200 rounded-xl text-base font-bold outline-none">
                            <option value="부산 중구 구덕로 10">부산 중구 구덕로 10</option>
                            <option value="부산 영도구 대교로 20">부산 영도구 대교로 20</option>
                            <option value="custom">✍️ 직접 입력</option>
                        </select>
                        <input id="input-address" type="text" placeholder="주소를 입력하세요" class="hidden w-full p-4 border-2 border-blue-200 rounded-xl text-base bg-blue-50/20 outline-none mt-2 font-bold">
                    </div>
                </div>

                <div class="space-y-3">
                    <p class="text-xs font-black text-emerald-600 tracking-wider uppercase pl-1">🐟 2. 상세 발주 품목 목록</p>
                    <div id="dynamic-form-container" class="space-y-5"></div>
                </div>

                <button type="button" onclick="addFormRow()" class="w-full bg-white hover:bg-slate-50 text-blue-600 border-3 border-dashed border-blue-300 py-4 rounded-2xl text-base font-black tracking-wide transition flex items-center justify-center gap-2 shadow-sm">
                    ➕ 새 발주 품목 추가하기
                </button>
            </div>
            
            <button onclick="submitOrderToLiveNetwork()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl text-lg font-black tracking-wide transition shadow-lg active:scale-[0.98]">
                🚀 실시간 발주 전송하기
            </button>

            <div class="pt-4 border-t border-slate-100 space-y-2">
                <p class="text-xs font-black text-slate-400 tracking-wider uppercase pl-1">📦 최근 보낸 발주 관리 (취소 가능)</p>
                <div id="owner-sent-log-container" class="space-y-2"></div>
            </div>
        </section>
    </main>

    <div id="success-large-modal" class="hidden fixed inset-0 bg-[#0f172a]/95 backdrop-blur-md z-50 flex items-center justify-center p-4 transition-all">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl space-y-6 text-center border-4 border-emerald-500 animate-in zoom-in duration-200">
            <div class="w-24 h-24 bg-emerald-100 rounded-full flex items-center justify-center mx-auto shadow-inner">
                <span class="text-5xl animate-bounce">✅</span>
            </div>
            
            <div class="space-y-3">
                <h3 id="success-modal-title" class="text-2xl font-black text-slate-900 tracking-tight leading-snug">자갈치상회</h3>
                <p class="text-xl font-extrabold text-emerald-600 tracking-wide">발주서 전송 성공!</p>
                <hr class="border-slate-200">
                <p class="text-base font-bold text-slate-500 leading-relaxed">
                    배송 기사 단말기로<br>
                    <span class="text-slate-900 underline decoration-blue-500 decoration-3">실시간 정상 전송</span> 되었습니다.
                </p>
            </div>

            <button onclick="closeSuccessLargeModal()" class="w-full bg-[#0f172a] hover:bg-slate-800 text-white py-5 rounded-2xl text-lg font-black tracking-widest transition shadow-lg active:scale-95 focus:outline-none">
                👍 확인했습니다
            </button>
        </div>
    </div>

    <script>
        let rowIdx = 0; let activeRows = [];
        const cloudRelayUrl = "https://ntfy.sh/fish_net_relay_";

        if(!localStorage.getItem('sync_code')) localStorage.setItem('sync_code', '1');
        document.getElementById('input-sync-code').value = localStorage.getItem('sync_code');
        document.getElementById('sync-code-text').innerText = `🟢 배송 채널: ${localStorage.getItem('sync_code')}호차`;

        const today = new Date(); const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('order-date').value = tomorrow.toISOString().split('T')[0];

        function handleRowSelectChange(selectEl, id, fieldName) {
            const inputEl = document.getElementById(`input-${fieldName}-${id}`);
            if (selectEl.value === 'custom') { inputEl.classList.remove('hidden'); inputEl.focus(); } 
            else { inputEl.classList.add('hidden'); inputEl.value = ''; }
        }
        function handleSelectChange(selectEl, inputId) {
            const inputEl = document.getElementById(inputId);
            if (selectEl.value === 'custom') { inputEl.classList.remove('hidden'); inputEl.focus(); } 
            else { inputEl.classList.add('hidden'); inputEl.value = ''; }
        }
        function getRowResolvedValue(id, fieldName) {
            const selectEl = document.getElementById(`sel-${fieldName}-${id}`);
            const inputEl = document.getElementById(`input-${fieldName}-${id}`);
            return selectEl.value === 'custom' ? inputEl.value : selectEl.value;
        }
        function getResolvedValue(selectId, inputId) {
            const selectEl = document.getElementById(selectId);
            const inputEl = document.getElementById(inputId);
            return selectEl.value === 'custom' ? inputEl.value : selectEl.value;
        }

        function addFormRow() {
            const id = rowIdx++; activeRows.push(id);
            const rowHtml = `
                <div id="form-row-${id}" class="bg-slate-50 p-5 rounded-2xl border-2 border-slate-200 relative space-y-4 shadow-sm">
                    <div class="flex justify-between items-center border-b border-slate-200 pb-2">
                        <span class="text-base font-black text-slate-700">📋 발주 품목 정보</span>
                        <button type="button" onclick="removeFormRow(${id})" class="text-sm text-rose-600 font-bold bg-white border-2 border-rose-100 px-3 py-1.5 rounded-xl">❌ 품목 취소</button>
                    </div>
                    <div class="space-y-1.5">
                        <label class="block text-base font-black text-slate-600">발주 품목 선택 (카테고리)</label>
                        <select id="sel-category-${id}" onchange="handleRowSelectChange(this, id, 'category')" class="w-full p-4 bg-white border-2 border-slate-200 rounded-xl text-base font-bold outline-none">
                            <option value="활어">활어</option><option value="필렛제품">필렛제품</option><option value="냉동제품">냉동제품</option>
                            <option value="패류.해산물">패류.해산물</option><option value="연어.포장품">연어.포장품</option><option value="기타">기타</option>
                            <option value="custom">✍️ 직접 입력</option>
                        </select>
                        <input id="input-category-${id}" type="text" placeholder="직접 입력하세요" class="hidden w-full p-4 border-2 border-blue-200 rounded-xl text-base bg-white outline-none mt-2 font-bold">
                    </div>
                    <div class="space-y-1.5">
                        <label class="block text-base font-black text-slate-600">어종 / 품목명</label>
                        <select id="sel-item-${id}" onchange="handleRowSelectChange(this, id, 'item')" class="w-full p-4 bg-white border-2 border-slate-200 rounded-xl text-base font-bold outline-none">
                            <option value="광어">광어</option><option value="도미">도미</option><option value="농어">농어</option>
                            <option value="점성어">점성어</option><option value="연어">연어</option><option value="우니(성게알)">우니(성게알)</option>
                            <option value="전복">전복</option><option value="멍게">멍게</option><option value="백상합">백상합</option>
                            <option value="개불">개불</option><option value="소라">소라</option><option value="해삼">해삼</option>
                            <option value="가리비">가리비</option><option value="기타">기타</option>
                            <option value="custom">✍️ 직접 입력</option>
                        </select>
                        <input id="input-item-${id}" type="text" placeholder="직접 입력하세요" class="hidden w-full p-4 border-2 border-blue-200 rounded-xl text-base bg-white outline-none mt-2 font-bold">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1.5">
                            <label class="block text-base font-black text-slate-600">원산지 선택</label>
                            <select id="sel-origin-${id}" onchange="handleRowSelectChange(this, id, 'origin')" class="w-full p-4 bg-white border-2 border-slate-200 rounded-xl text-base font-bold outline-none">
                                <option value="국내산">국내산</option><option value="노르웨이">노르웨이</option><option value="일본">일본</option>
                                <option value="중국">중국</option><option value="러시아">러시아</option><option value="칠레">칠레</option>
                                <option value="캐나다">캐나다</option><option value="미국">미국</option><option value="기타">기타</option>
                                <option value="custom">✍️ 직접 입력</option>
                            </select>
                            <input id="input-origin-${id}" type="text" placeholder="원산지 입력" class="hidden w-full p-4 border-2 border-blue-200 rounded-xl text-base bg-white outline-none mt-2 font-bold">
                        </div>
                        <div class="space-y-1.5">
                            <label class="block text-base font-black text-slate-600">작업 및 보관 방식</label>
                            <select id="sel-process-${id}" onchange="handleRowSelectChange(this, id, 'process')" class="w-full p-4 bg-white border-2 border-slate-200 rounded-xl text-base font-bold outline-none">
                                <option value="찍어바리">찍어바리</option><option value="필렛 작업">필렛 작업</option><option value="냉동 보관">냉동 보관</option>
                                <option value="활어">활어</option><option value="해수 보관">해수 보관</option><option value="일반 포장">일반 포장</option>
                                <option value="custom">✍️ 직접 입력</option>
                            </select>
                            <input id="input-process-${id}" type="text" placeholder="작업 방식 입력" class="hidden w-full p-4 border-2 border-blue-200 rounded-xl text-base bg-white outline-none mt-2 font-bold">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1.5">
                            <label class="block text-base font-black text-slate-600">주문 수량</label>
                            <select id="sel-qty-${id}" onchange="handleRowSelectChange(this, id, 'qty')" class="w-full p-4 bg-white border-2 border-slate-200 rounded-xl text-base font-bold outline-none">
                                <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="5">5</option><option value="10">10</option>
                                <option value="custom">✍️ 직접 입력</option>
                            </select>
                            <input id="input-qty-${id}" type="number" placeholder="수량" class="hidden w-full p-4 border-2 border-blue-200 rounded-xl text-base bg-white outline-none mt-2 font-bold">
                        </div>
                        <div class="space-y-1.5">
                            <label class="block text-base font-black text-slate-700">단위</label>
                            <select id="sel-unit-${id}" onchange="handleSelectChange(this, 'input-unit-${id}')" class="w-full p-4 bg-white border-2 border-slate-200 rounded-xl text-base font-bold outline-none">
                                <option value="박스">박스</option><option value="마리">마리</option><option value="팩">팩</option><option value="망">망</option>
                                <option value="봉지">봉지</option><option value="kg">kg</option><option value="custom">✍️ 직접 입력</option>
                            </select>
                            <input id="input-unit-${id}" type="text" placeholder="단위명" class="hidden w-full p-4 border-2 border-blue-200 rounded-xl text-base bg-white outline-none mt-2 font-bold">
                        </div>
                    </div>
                    <div class="space-y-1.5">
                        <label class="block text-base font-black text-slate-600">📝 품목별 요구 메모란</label>
                        <input id="input-memo-${id}" type="text" placeholder="특이사항이 있을 경우 작성해 주세요" class="w-full p-4 border-2 border-slate-200 rounded-xl text-base font-bold outline-none bg-white">
                    </div>
                </div>
            `;
            document.getElementById('dynamic-form-container').insertAdjacentHTML('beforeend', rowHtml);
        }

        function removeFormRow(id) {
            const el = document.getElementById(`form-row-${id}`); if (el) el.remove();
            activeRows = activeRows.filter(item => item !== id); if(activeRows.length === 0) addFormRow();
        }

        function updateSettingsMaster() {
            const code = document.getElementById('input-sync-code').value.trim().replace(/[^a-zA-Z0-9_-]/g, '');
            if(!code) return; localStorage.setItem('sync_code', code);
            document.getElementById('sync-code-text').innerText = `🟢 배송 채널: ${code}호차`;
            toggleView('owner');
        }

        // ✍️ [개조 로직]: 구식 alert 안내창을 완전히 차단하고 대형 시각 모달 팝업 가동 연동
        function submitOrderToLiveNetwork() {
            if(activeRows.length === 0) return;
            const orderDate = document.getElementById('order-date').value;
            const store = getResolvedValue('sel-store', 'input-store');
            const phone = getResolvedValue('sel-phone', 'input-phone');
            const address = getResolvedValue('sel-address', 'input-address');
            if(!store) return;

            let items = [];
            for (let id of activeRows) {
                const category = getRowResolvedValue(id, 'category'); const item = getRowResolvedValue(id, 'item');
                const origin = getRowResolvedValue(id, 'origin'); const process = getRowResolvedValue(id, 'process');
                const qty = getRowResolvedValue(id, 'qty'); const unit = getRowResolvedValue(id, 'unit');
                const memo = document.getElementById(`input-memo-${id}`).value || "없음";
                if(!item || !qty) return; items.push({ category, item, origin, process, qty, unit, memo });
            }

            const currentStamp = Date.now();
            const uniqueOrderId = `${store.replace(/\s+/g, '')}_${currentStamp}`;
            const orderPacket = { orderId: uniqueOrderId, status: "ordered", orderDate, store, phone, address, items, alarmActive: true, serverTimestamp: currentStamp };
            const syncCode = localStorage.getItem('sync_code');

            fetch(`${cloudRelayUrl}${syncCode}`, { method: 'POST', body: JSON.stringify(orderPacket) })
            .then(res => {
                // 팝업 데이터 주입 및 가동
                document.getElementById('success-modal-title').innerText = store;
                document.getElementById('success-large-modal').classList.remove('hidden');

                let mySentLog = JSON.parse(localStorage.getItem('my_sent_orders') || '[]');
                mySentLog.unshift({ orderId: uniqueOrderId, store, orderDate, status: 'ordered' });
                localStorage.setItem('my_sent_orders', JSON.stringify(mySentLog));
                renderSentOrdersLog();

                document.getElementById('dynamic-form-container').innerHTML = ""; activeRows = []; addFormRow();
            });
        }

        function closeSuccessLargeModal() {
            document.getElementById('success-large-modal').classList.add('hidden');
        }

        function cancelOrderFromOwner(orderId, store) {
            if(!confirm(`⚠️ [${store}] 발주를 정말 취소하시겠습니까?\n기사님 관제 창에 즉시 취소 신호가 전송됩니다.`)) return;
            const syncCode = localStorage.getItem('sync_code');
            const cancelPacket = { orderId: orderId, status: "cancelled", store: store, serverTimestamp: Date.now() };

            fetch(`${cloudRelayUrl}${syncCode}`, { method: 'POST', body: JSON.stringify(cancelPacket) })
            .then(() => {
                let mySentLog = JSON.parse(localStorage.getItem('my_sent_orders') || '[]');
                mySentLog = mySentLog.map(o => { if(o.orderId === orderId) o.status = 'cancelled'; return o; });
                localStorage.setItem('my_sent_orders', JSON.stringify(mySentLog));
                renderSentOrdersLog();
                alert("🛑 발주 취소 신호가 실시간 송출되었습니다.");
            });
        }

        function renderSentOrdersLog() {
            const mySentLog = JSON.parse(localStorage.getItem('my_sent_orders') || '[]');
            const container = document.getElementById('owner-sent-log-container');
            if(mySentLog.length === 0) { container.innerHTML = `<p class="text-xs text-slate-400 italic pl-1">최근 보낸 발주 내역이 없습니다.</p>`; return; }
            container.innerHTML = mySentLog.slice(0, 5).map(o => `
                <div class="flex items-center justify-between p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold">
                    <div><span class="text-slate-900">${o.store}</span><span class="text-slate-400 block mt-0.5">요청일: ${o.orderDate}</span></div>
                    <div>${o.status === 'cancelled' ? `<span class="text-rose-500 bg-rose-50 px-2.5 py-1.5 rounded-lg border border-rose-200">❌ 취소완료</span>` : `<button onclick="cancelOrderFromOwner('${o.orderId}', '${o.store}')" class="bg-white hover:bg-rose-50 text-rose-600 border border-rose-200 px-2.5 py-1.5 rounded-lg transition shadow-sm">❌ 발주취소</button>`}</div>
                </div>
            `).join('');
        }

        function checkUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const urlStore = urlParams.get('store'); const urlCar = urlParams.get('car');
            if (urlCar) { const cleanedCar = urlCar.trim().replace(/[^a-zA-Z0-9_-]/g, ''); if (cleanedCar) { localStorage.setItem('sync_code', cleanedCar); document.getElementById('input-sync-code').value = cleanedCar; document.getElementById('sync-code-text').innerText = `🟢 배송 채널: ${cleanedCar}호차`; } }
            if (urlStore) { const selStore = document.getElementById('sel-store'); let isExistOption = false; for(let i=0; i<selStore.options.length; i++) { if(selStore.options[i].value === urlStore) { selStore.value = urlStore; isExistOption = true; break; } } if(!isExistOption) { selStore.value = 'custom'; const inputStore = document.getElementById('input-store'); inputStore.classList.remove('hidden'); inputStore.value = urlStore; } }
        }

        function toggleView(viewName) {
            if(viewName==='settings') document.getElementById('view-settings').classList.toggle('hidden');
            else document.getElementById('view-settings').classList.add('hidden');
        }
        addFormRow(); checkUrlParameters(); renderSentOrdersLog();
    </script>
</body>
</html>
