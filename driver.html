    function renderDeliveryForm(){const d=formDraft;$("#formModal").innerHTML=`<div class="modal-card"><div class="modal-head"><div><h2>${deliveryEditId?"발주·포장 수정":"수동 배송 추가"}</h2><p>입력 내용은 하차 체크와 명세서에 연결됩니다.</p></div><button class="close-button" type="button" data-action="close-modal">×</button></div><form id="deliveryForm" class="modal-body"><label class="field"><span>거래처</span><select class="control" name="customerId">${customers().map(c=>`<option value="${c.id}" ${c.id===d.customerId?"selected":""}>${esc(c.name)}</option>`).join("")}</select></label><div class="two"><label class="field"><span>배송일</span><input class="control" name="deliveryDate" type="date" value="${esc(d.deliveryDate)}"></label><label class="field"><span>배송순서</span><input class="control" name="routeOrder" type="number" min="1" value="${d.routeOrder}"></label></div><label class="band-line" style="border-color:#d46a61;color:#8e1711;background:var(--red-soft)"><input name="isUrgentAdditional" type="checkbox" ${d.isUrgentAdditional?"checked":""}>🚨 긴급 추가 발주로 등록</label><div class="heading" style="margin:6px 0 0"><h2 style="font-size:18px">어종·제품</h2><button class="mini" type="button" data-action="add-form-item">＋ 품목</button></div><div id="formItems">${d.items.map(renderItemEditor).join("")}</div><div class="heading" style="margin:6px 0 0"><h2 style="font-size:18px">박스·동봉품</h2><button class="mini" type="button" data-action="add-form-box">＋ 박스</button></div><div id="formBoxes">${d.boxes.map(renderBoxEditor).join("")||`<div class="empty">박스가 없으면 추가하지 않아도 됩니다.</div>`}</div><label class="field"><span>동봉품 전체 메모</span><textarea class="control" name="coPackNote">${esc(d.coPackNote)}</textarea></label><label class="field"><span>전날 미수금액</span><input class="control" name="previousBalance" type="number" min="0" value="${d.previousBalance||""}"></label><label class="field"><span>전체 메모</span><textarea class="control" name="notes">${esc(d.notes)}</textarea></label><div class="total-preview"><span>예상 합계</span><b id="f     function renderItemEditor(i,index){return`<article class="item-editor" data-form-item="${index}"><div class="item-editor-head"><strong>${index+1}번 품목</strong><button type="button" data-action="remove-form-item" data-index="${index}" ${formDraft.items.length===1?"disabled":""}>삭제</button></div><div class="three"><label class="field"><span>구분</span><select class="control" data-item-field="category">${categories.map(v=>`<option ${v===i.category?"selected":""}>${v}</option>`).join("")}</select></label><label class="field"><span>어종·품목</span><input class="control" data-item-field="species" value="${esc(i.species)}"></label><label class="field"><span>규격</span><input class="control" data-item-field="size" value="${esc(i.size)}"></label></div><div class="three"><label class="field"><span>원산지</span><input class="control" data-item-field="originCountry" list="originList" value="${esc(i.originCountry)}"></label><label class="field"><span>주문 수량</span><input class="control" data-item-field="requestedQty" type="number" min="0" step=".01" value="${i.requestedQty}"></label><label class="field"><span>주문 단위</span><select class="control" data-item-field="unit">${units.map(v=>`<option ${v===i.unit?"selected":""}>${v}</option>`).join("")}</select></label></div><div class="three"><label class="field"><span>${(i.weighings||[]).length?"계근 자동 합계 kg":"실제 중량 kg"}</span><input class="control" data-item-field="actualWeight" type="number" min="0" step=".001" value="${i.actualWeight??""}" ${(i.weighings||[]).length?"disabled":""}></label><label class="field"><span>판매 단가</span><input class="control" data-item-field="unitPrice" type="number" min="0" value="${i.unitPrice||""}"></label><label class="field"><span>가격 기준</span><select class="control" data-item-field="priceUnit">${units.map(v=>`<option value="${v}" ${v===i.priceUnit?"selected":""}>${v}당</option>`).join("")}</select></label></div><div class="three"><label class="field"><span>수조 위치</span><select class="control" data-item-field="tankNumb     function syncFormDraft(){const form=$("#deliveryForm");if(!form)return;form.querySelectorAll("[data-form-item]").forEach(card=>{const item=formDraft.items[Number(card.dataset.formItem)];card.querySelectorAll("[data-item-field]").forEach(el=>{const key=el.dataset.itemField;item[key]=el.type==="checkbox"?el.checked:el.value})});form.querySelectorAll("[data-form-box]").forEach(row=>{const box=formDraft.boxes[Number(row.dataset.formBox)];box.contents=row.querySelector("[data-box-field]").value});const fd=Object.fromEntries(new FormData(form));Object.assign(formDraft,{customerId:Number(fd.customerId),deliveryDate:fd.deliveryDate,routeOrder:Math.max(1,Number(fd.routeOrder)||1),isUrgentAdditional:Boolean(form.querySelector('[name="isUrgentAdditional"]')?.checked),coPackNote:String(fd.coPackNote||""),notes:String(fd.notes||""),previousBalance:Math.max(0,Number(fd.previousBalance)||0)})}

    function saveDelivery(){
      syncFormDraft();normalizeFormDraft();const desired=formDraft.routeOrder;
      if(deliveryEditId){const idx=state.deliveries.findIndex(d=>d.id===deliveryEditId),old=state.deliveries[idx];formDraft.items.forEach(item=>{const before=old.items.find(x=>x.id===item.id),from=Number(before?.tankNumber)||0,to=Number(item.tankNumber)||0,loadingChanged=before&&(from!==to||before.species!==item.species||Number(before.requestedQty)!==Number(item.requestedQty)||Number(before.actualWeight)!==Number(item.actualWeight));if(before&&from!==to){item.tankHistory=item.tankHistory||[];item.tankHistory.push(normalizeTankChange({from,to,reason:"발주·포장 내용 수정"}))}if(loadingChanged){item.checked=false;item.tankLoaded=false;item.tankLoadedAt=null}});if(formDraft.boxes.length!==old.boxes.length||formDraft.boxes.some((b,n)=>b.contents!==old.boxes[n]?.contents)){formDraft.boxCountConfirmed=false;formDraft.boxCountConfirmedAt=null}if(formDraft.isUrgentAdditional&&!old.isUrgentAdditional){formDraft.urgentAcknowledged=false;formDraft.urgentAcknowledgedAt=null;formDraft.status="new"}if(!formDraft.isUrgentAdditional){formDraft.urgentAcknowledged=true;formDraft.urgentAcknowledgedAt=null}formDraft.id=deliveryEditId;state.deliveries[idx]=formDraft}

      workDate=formDraft.deliveryDate;const target=formDraft,list=state.deliveries.filter(d=>d.deliveryDate===workDate&&d.status!=="cancelled"&&d.id!==target.id).sort(byOrder);list.splice(Math.max(0,Math.min(list.length,desired-1)),0,target);list.forEach((d,i)=>d.routeOrder=i+1);saveState();closeModal("formModal");render()

    function openBoxCompare(message=""){const rows=boxCompareRows(),cards=rows.map(d=>{const c=customerOf(d),planned=d.boxes.length,actual=d.loadedBoxCount,ok=d.boxCountConfirmed&&actual===planned;return`<article class="box-compare-row ${d.boxCountConfirmed&&!ok?"mismatch":""}" data-box-compare="${d.id}"><div><strong>${d.routeOrder}번 ${esc(c.name)}</strong><small>계획된 박스 내용을 먼저 보고 실제 상차 박스를 세어 주세요.</small></div><div class="load-controls"><button type="button" data-action="box-step" data-step="-1">−</button><input data-box-count-input type="number" inputmode="numeric" min="0" max="99" value="${actual}" aria-label="${esc(c.name)} 실제 상차 박스 수"><button type="button" data-action="box-step" data-step="1">＋</button></div><div class="box-count-result ${ok?"ok":d.boxCountConfirmed?"bad":""}">계획 ${planned}박스 / 실제 ${actual}박스 · ${ok?"✓ 일치":d.boxCountConfirmed?"⚠ 불일치":"대조 전"}</div><button class="full-button ${ok?"warning-button":"primary-button"}" type="button" data-action="confirm-box-count" data-id="${d.id}">${ok?"수량 다시 확인":"이 수량으로 대조 확인"}</button></article>`}).join("");$("#boxModal").innerHTML=`<div class="modal-card"><div class="modal-head"><div><h2>📦 박스 수량 대조</h2><p>계획 수량과 실제 차량 상차 수량을 비교합니다.</p></div><button class="close-button" type="button" data-action="close-box">×</button></div><div class="modal-body">${message?`<div class="weigh-ready">${esc(message)}</div>`:""}<div class="senior-guide"><b>확인 방법</b>① 실제 박스 세기 → ② −/＋로 수량 맞추기 → ③ 대조 확인 누르기</div>${cards||`<div class="empty">오늘 대조할 박스가 없습니다.</div>`}<button class="full-button outline-button" type="button" data-action="close-box">배송 화면으로 돌아가기</button></div></div>`;$("#boxModal").classList.remove("hidden")}
    function confirmBoxCount(id,button){const d=state.deliveries.find(x=>x.id===Number(id)),input=button.closest("[data-box-compare]")?.querySelector("[data-box-count-input]");if(!d||!input)return;d.loadedBoxCount=Math.max(0,Math.floor(Number(input.value)||0));d.boxCountConfirmed=true;d.boxCountConfirmedAt=new Date().toISOString();saveState("박스 수량 대조 전");renderToday();const ok=d.loadedBoxCount===d.boxes.length;openBoxCompare(`${customerOf(d).name} · 계획 ${d.boxes.length}박스 / 실제 ${d.loadedBoxCount}박스 ${ok?"일치했습니다.":"불일치합니다. 박스를 다시 확인해 주세요."}`)}

    function openDepartureCheck(){const issues=departureIssues(),loads=tankLoadRows(),boxes=boxCompareRows(),urgent=urgentRows(),record=state.departureChecks?.[workDate],ready=departureReady(),confirmedAt=record?.at?new Date(record.at).toLocaleString("ko-KR"):"";const rows=issues.map((issue,index)=>`<article class="issue-row"><span class="issue-icon">${issueIcon(issue.type)}</span><div><strong>${esc(issue.title)}</strong><small>${esc(issue.detail)}</small></div><button type="button" data-action="resolve-departure-issue" data-index="${index}">${issueButtonLabel(issue.type)}</button></article>`).join("");$("#departureModal").innerHTML=`<div class="modal-card"><div class="modal-head"><div><h2>🚚 출차 전 최종 점검</h2><p>${esc(workDate)} · ${esc(state.profile.vehicleNumber)}호차</p></div><button class="close-button" type="button" data-action="close-departure">×</button></div><div class="modal-body"><div class="check-summary"><div><small>긴급 미확인</small><strong>${urgent.length}</strong></div><div><small>수조 상차</small><strong>${loads.filter(x=>x.i.tankLoaded).length}/${loads.length}</strong></div><div><small>박스 일치</small><strong>${boxes.filter(d=>d.boxCountConfirmed&&d.loadedBoxCount===d.boxes.length).length}/${boxes.length}</strong></div><div><small>문제 항목</small><strong>${issues.length}</strong></div></div>${ready?`<div class="departure-ready-card"><div class="icon">✓</div><h2>출차 준비 완료</h2><p>${esc(confirmedAt)} · ${esc(state.profile.driverName)} 확인</p><p>이후 발주·수조·박스·계근 내용이 바뀌면 자동으로 재점검 상태가 됩니다.</p></div>`:issues.length?`<div class="weigh-notice">아래 빨간 항목을 모두 처리하면 ‘출차 준비 완료’ 버튼이 나타납니다.</div><div class="issue-list">${rows}</div>`:`<div class="weigh-ready">모든 항목이 일치합니다. 아래 버튼으로 최종 확인해 주세요.</div><button class="full-button primary-button" type="button" data-action="confirm-departure">✓ 모든 내용 확인 · 출차 준비 완료</button>`}<button class="full-button outline-button" type="button" data-action="close-departure">배송 화면으로 돌아가기</button></div></div>`;$("#departureModal").classList.remove("hidden")}

    function openAutoBackups(message=""){const rows=backupRows(),cards=rows.map(entry=>{let info="내용 확인 불가";try{const raw=JSON.parse(entry.data),dateCount=new Set((raw.deliveries||[]).map(d=>d.deliveryDate)).size;info=`거래처 ${(raw.customers||[]).length}곳 · 배송 ${(raw.deliveries||[]).length}건 · 업무일 ${dateCount}일`}catch{}return`<article class="backup-row"><div><strong>${esc(new Date(entry.at).toLocaleString("ko-KR"))}</strong><small>${esc(entry.reason)}<br>${esc(info)}</small></div><button type="button" data-action="restore-auto-backup" data-id="${entry.id}">이 시점으로 복구</button></article>`}).join("");$("#backupModal").innerHTML=`<div class="modal-card"><div class="modal-head"><div><h2>🛟 자동 백업·복구</h2><p>최근 변경 전 자료를 최대 8개까지 보관합니다.</p></div><button class="close-button" type="button" data-action="close-backups">×</button></div><div class="modal-body">${message?`<div class="weigh-ready">✓ ${esc(message)}</div>`:""}<button class="full-button primary-button" type="button" data-action="create-auto-backup">지금 상태 백업 만들기</button>${cards||`<div class="empty">아직 자동 백업이 없습니다.<br>자료를 수정하면 변경 전 내용이 자동 보관됩니다.</div>`}<div class="notice">복구를 실행해도 현재 자료를 먼저 한 번 더 백업하므로 되돌릴 수 있습니다.</div><button class="full-button outline-button" type="button" data-action="close-backups">설정 화면으로 돌아가기</button></div></div>`;$("#backupModal").classList.remove("hidden")}

    function openChecklist(id,notice=""){selectedDeliveryId=id;const d=state.deliveries.find(x=>x.id===id);if(!d)return;const c=customerOf(d),p=progress(d),locked=d.status==="completed",weighReady=deliveryWeighingReady(d);const itemHtml=d.items.map(i=>{const weightCount=(i.weighings||[]).length;return`<article class="check-card ${i.checked?"checked":""}" data-check-item="${i.id}"><div class="check-main"><input type="checkbox" data-check-toggle="item" ${i.checked?"checked":""} ${locked?"disabled":""}><span class="check-copy"><strong>${esc(i.species)} · ${esc(quantityText(i))}</strong><small>${esc(i.size)} / ${esc(i.originCountry)} / ${esc(i.processing)}</small><span class="important-tags"><span class="tag">${tankLabel(i.tankNumber)}</span>${i.tankNumber?`<span class="tag" style="color:${i.tankLoaded?"#155d32":"#7b3f0c"};background:${i.tankLoaded?"#dff4e6":"#ffedda"}">수조 실제 상차 ${i.tankLoaded?"완료":"미확인"}</span>`:""}${isWeighable(i)?`<span class="tag" style="color:${i.weighingConfirmed?"#155d32":"#7b3f0c"};background:${i.weighingConfirmed?"#dff4e6":"#ffedda"}">계근 ${weightCount}마리 · ${weightTotal(i).toFixed(3)}kg ${i.weighingConfirmed?"확정":"미확정"}</span>`:""}${i.rubberBand?`<span class="tag">밴드 ${esc(i.rubberBandColor)} ${i.rubberBandQuantity}개</span>`:""}${i.includedNote?`<span class="tag memo">${esc(i.includedNote)}</span>`:""}</span></span></div><div class="tank-current"><div><span>현재 상차 위치</span><strong>${tankLabel(i.tankNumber)}</strong></div>${locked?"":`<button type="button" data-action="open-tank-change" data-delivery-id="${d.id}" data-item-id="${i.id}" data-source="check">🔄 수조 변경</button>`}</div><div class="check-inputs"><label class="field"><span>${weightCount?"계근 합계 kg":"실제 중량 kg"}</span><input class="control" data-check-field="actualWeight" type="number" min="0" step=".001" value="${i.actualWeight??""}" ${locked||weightCount?"disabled":""}></label><label class="field"><span>확정 단가</span><input class="control" data-check-field="unitPrice" type="number" min="0" value="${i.unitPrice||""}" ${locked?"disabled":""}></label></div>${isWeighable(i)&&!locked?`<button class="full-button outline-button" type="button" data-action="open-weigh-item" data-delivery-id="${d.id}" data-item-id="${i.id}">⚖️ 개별 계근 ${weightCount?"확인·수정":"입력"}</button>`:""}</article>`}).join("");
      const boxes=d.boxes.map(b=>`<article class="check-card ${b.checked?"checked":""}" data-check-box="${b.id}"><div class="check-main"><input type="checkbox" data-check-toggle="box" ${b.checked?"checked":""} ${locked?"disabled":""}><span class="check-copy"><strong>${b.boxNumber}번 박스</strong><small>${esc(b.contents||"내용 미입력")}</small></span>${locked?"":`<button class="mini" type="button" data-action="delete-check-box" data-id="${b.id}">삭제</button>`}</div>${locked?"":`<input class="control" data-check-box-content value="${esc(b.contents)}" placeholder="박스 동봉 내역">`}</article>`).join("");
      const amount=d.items.reduce((s,i)=>s+itemAmount(i),0),allChecked=p.total>0&&p.done===p.total,canComplete=allChecked&&weighReady,boxMatched=!d.boxes.length||d.boxCountConfirmed&&d.loadedBoxCount===d.boxes.length;$("#checkModal").innerHTML=`<div class="modal-card"><div class="modal-head"><div><h2>${esc(c.name)}</h2><p>${d.routeOrder}번째 배송지 · ${p.done}/${p.total} 확인</p></div><button class="close-button" type="button" data-action="close-check">×</button></div><div class="modal-body">${notice?`<div class="weigh-ready">✓ ${esc(notice)}<br>하차 확인 체크가 자동 해제되었습니다.</div>`:""}<div class="heading"><div><h2 style="font-size:18px">어종·수조·요구사항</h2><p>실물과 대조한 뒤 체크하세요.</p></div></div>${itemHtml||`<div class="empty">품목이 없습니다.</div>`}<div class="heading" style="margin-top:6px"><div><h2 style="font-size:18px">박스·동봉품</h2><p>${esc(d.coPackNote||"동봉품 전체 메모 없음")}</p></div>${locked?"":`<button class="mini" type="button" data-action="add-check-box">＋ 박스</button>`}</div>${d.boxes.length?`<div class="box-count-result ${boxMatched?"ok":"bad"}">출차 대조: 계획 ${d.boxes.length}박스 / 실제 ${d.loadedBoxCount}박스 · ${boxMatched?"일치":"대조 필요"}</div>`:""}${boxes||`<div class="empty">등록된 박스가 없습니다.</div>`}${weighReady?"":`<div class="weigh-notice no-print">활어 계근을 모두 확정해야 거래명세서를 출력하고 하차 완료할 수 있습니다.</div>`}<div class="balance-editor no-print"><div><strong>전미수(전날 미수)</strong><small>거래명세서에 항상 표시됩니다.</small></div><label class="field"><span>금액</span><input id="previousBalanceInput" class="control" type="number" inputmode="numeric" min="0" step="1" value="${Number(d.previousBalance)||0}"></label><button type="button" data-action="save-previous-balance">수정 적용</button><small id="balanceSaved">금액을 수정한 뒤 ‘수정 적용’을 누르세요.</small></div><div id="statementView" class="statement">${statementHTML(d,c,amount)}</div><div class="output-grid no-print"><button type="button" data-action="print-statement" ${weighReady?"":"disabled"}>🖨️ 인쇄</button><button type="button" data-action="image-statement" data-format="png" ${weighReady?"":"disabled"}>PNG 저장</button><button type="button" data-action="image-statement" data-format="jpg" ${weighReady?"":"disabled"}>JPG 저장</button></div>${locked?"":`<button class="full-button outline-button no-print" type="button" data-action="edit-delivery" data-id="${d.id}">발주·포장 내용 수정</button>`}${locked?`<button class="full-button warning-button no-print" type="button" data-action="undo-complete" data-id="${d.id}">하차 완료 취소 · 다시 확인</button>`:`<button class="full-button primary-button no-print" type="button" data-action="complete-delivery" data-id="${d.id}" ${canComplete?"":"disabled"}>${!weighReady?"활어 계근을 먼저 확정해 주세요":allChecked?"모두 확인 · 하차 완료":"어종과 박스를 모두 확인해 주세요"}</button>`}</div></div>`;$("#checkModal").classList.remove("hidden")}
    function statementHTML(d,c,amount){const lines=d.items.map(i=>{const base=baseAmount(i),fee=i.category==="필렛 제품"?(Number(i.actualWeight??i.requestedQty)||0)*(Number(i.processingFeePerKg)||0):0,weightNote=(i.weighings||[]).length?` / 개별계근 ${i.weighings.length}마리 ${weightTotal(i).toFixed(3)}kg${i.weighingConfirmed?" 확정":" 미확정"}`:"";return`<div class="statement-line"><span>${esc(i.species)} · ${esc(i.originCountry)} · ${esc(quantityText(i))}<br><small>${esc(i.size)} / ${money(i.unitPrice)}원/${esc(i.priceUnit)}당${fee?` / 작업비 ${money(i.processingFeePerKg)}원/kg`:""}${weightNote}</small></span><b>${money(base+fee)}원</b></div>`}).join("");const previous=Number(d.previousBalance)||0,due=amount+previous;return`<h1>거래명세서</h1><div class="statement-meta"><p><span>공급자</span><b>${esc(state.profile.companyName||"-")}</b></p><p><span>담당자</span><b>${esc(state.profile.driverName||"-")} · ${esc(state.profile.vehicleNumber||"-")}호차</b></p><p><span>거래처</span><b>${esc(c.name)}</b></p><p><span>납품처</span><b>${esc(c.deliveryPlace||"-")}</b></p><p class="wide"><span>주소</span><b>${esc(c.address||"-")}</b></p><p><span>연락처</span><b>${esc(c.phone||"-")}</b></p><p><span>배송일</span><b>${esc(d.deliveryDate)}</b></p></div>${lines}<div class="statement-sub"><span>당일 공급금액</span><b>${money(amount)}원</b></div><div class="statement-sub" style="color:var(--amber)"><span>전미수(전날 미수)</span><b>${money(previous)}원</b></div><div class="statement-total"><span>최종 합계</span><b>${money(due)}원</b></div>${d.notes?`<div class="statement-note">${esc(d.notes)}</div>`:""}`}

          }else if(packet.status==="cancelled"&&existing&&existing.status!=="cancelled"){existing.status="cancelled";changed=true;triggerCancel(packet.store||customerOf(existing).name)}
        }

      }catch{$("#networkDot").className="dot loading";$("#networkText").textContent=navigator.onLine?"발주 연결 재시도 중":"인터넷 끊김"}
    }

      if(action==="ack-cancel"){const id=Number(b.dataset.id),d=state.deliveries.find(x=>x.id===id),acked=readJSON(ACK_KEY,[]);if(d?.cloudOrderId&&!acked.includes(d.cloudOrderId)){acked.push(d.cloudOrderId);localStorage.setItem(ACK_KEY,JSON.stringify(acked))}state.deliveries=state.deliveries.filter(x=>x.id!==id);saveState();return renderToday()}
      if(action==="delete-delivery"){if(confirm("이 배송 기록을 삭제할까요?")){state.deliveries=state.deliveries.filter(d=>d.id!==Number(b.dataset.id));normalizeRoutes();saveState();renderToday()}return}
      if(action==="close-modal")return closeModal("formModal");if(action==="close-check")return closeModal("checkModal");if(action==="close-purchase")return closeModal("purchaseModal");if(action==="close-image")return closeModal("imageModal");
      if(action==="add-form-item"){syncFormDraft();formDraft.items.push(blankItem());return rerenderDeliveryForm()}if(action==="remove-form-item"){syncFormDraft();if(formDraft.items.length>1)formDraft.items.splice(Number(b.dataset.index),1);return rerenderDeliveryForm()}if(action==="add-form-box"){syncFormDraft();formDraft.boxes.push(normalizeBox({contents:""},formDraft.boxes.length));return rerenderDeliveryForm()}if(action==="remove-form-box"){syncFormDraft();formDraft.boxes.splice(Number(b.dataset.index),1);formDraft.boxes=formDraft.boxes.map(normalizeBox);return rerenderDeliveryForm()}
      if(action==="edit-delivery"){closeModal("checkModal");return openDelivery(Number(b.dataset.id))}if(action==="add-check-box"){const d=state.deliveries.find(x=>x.id===selectedDeliveryId);d.boxes.push(normalizeBox({contents:""},d.boxes.length));d.boxCountConfirmed=false;d.boxCountConfirmedAt=null;saveState("박스 추가 전");return openChecklist(d.id)}if(action==="delete-check-box"){const d=state.deliveries.find(x=>x.id===selectedDeliveryId);d.boxes=d.boxes.filter(x=>x.id!==Number(b.dataset.id)).map(normalizeBox);d.boxCountConfirmed=false;d.boxCountConfirmedAt=null;saveState("박스 삭제 전");return openChecklist(d.id)}
      if(action==="complete-delivery"){const d=state.deliveries.find(x=>x.id===Number(b.dataset.id));if(!deliveryWeighingReady(d))return alert("활어 계근을 먼저 확정해 주세요.");d.status="completed";d.completedAt=new Date().toISOString();saveState();closeModal("checkModal");return render()}if(action==="undo-complete"){if(confirm("하차 완료를 취소하고 다시 확인할까요?")){const d=state.deliveries.find(x=>x.id===Number(b.dataset.id));d.status="ready";d.completedAt=null;saveState();openChecklist(d.id)}return}
      if(action==="print-statement")return printElement($("#statementView").outerHTML);if(action==="image-statement")return saveImage($("#statementView"),b.dataset.format,`${customerOf(state.deliveries.find(d=>d.id===selectedDeliveryId)).name}_거래명세서_${workDate}`);if(action==="open-purchase")return openPurchase();if(action==="print-purchase")return printElement($("#purchaseSheet").outerHTML);if(action==="image-purchase")return saveImage($("#purchaseSheet"),b.dataset.format,`당일_매입발주서_${workDate}`);if(action==="export-excel")return exportExcel();if(action==="backup")return backup();if(action==="restore")return $("#restoreInput").click();
      if(action==="delete-customer"){const id=Number(b.dataset.id);if(state.deliveries.some(d=>d.customerId===id))return alert("이 거래처의 배송 기록이 있어 삭제할 수 없습니다.");if(confirm("거래처를 삭제할까요?")){state.customers=state.customers.filter(c=>c.id!==id);normalizeCustomerOrder();saveState();closeModal("formModal");renderCustomers()}}
    });
    document.addEventListener("submit",e=>{e.preventDefault();if(e.target.id==="setupForm"||e.target.id==="settingsForm"){const fd=Object.fromEntries(new FormData(e.target));state.profile={companyName:String(fd.companyName).trim(),driverName:String(fd.driverName).trim(),vehicleNumber:String(fd.vehicleNumber).trim()};saveState();closeModal("setupModal");render();startCloudSync();if(e.target.id==="settingsForm")alert("회사·차량 정보를 저장했습니다.")}if(e.target.id==="customerForm")saveCustomer(e.target);if(e.target.id==="deliveryForm")saveDelivery();if(e.target.id==="weighingForm")addWeight(new FormData(e.target).get("weight"))});
    document.addEventListener("change",e=>{if(e.target.id==="workDate"){workDate=e.target.value||localDate(1);reorderMode=false;render()}if(e.target.dataset.action==="route-position")moveDelivery(Number(e.target.dataset.id),Number(e.target.value)-1);if(e.target.dataset.weightEntry)editWeight(e.target.dataset.weightEntry,e.target.value);if(e.target.dataset.checkToggle){const card=e.target.closest(e.target.dataset.checkToggle==="item"?"[data-check-item]":"[data-check-box]");if(e.target.dataset.checkToggle==="item")updateCheckItem(Number(card.dataset.checkItem),"checked",e.target.checked);else updateCheckBox(Number(card.dataset.checkBox),"checked",e.target.checked);openChecklist(selectedDeliveryId)}if(e.target.dataset.checkField){const card=e.target.closest("[data-check-item]");updateCheckItem(Number(card.dataset.checkItem),e.target.dataset.checkField,e.target.value);renderToday();openChecklist(selectedDeliveryId)}if(e.target.id==="restoreInput"&&e.target.files[0])restore(e.target.files[0]);if(e.target.dataset.itemField==="category"){syncFormDraft();normalizeFormDraft();rerenderDeliveryForm()}if(e.target.dataset.itemField==="rubberBand"){syncFormDraft();normalizeFormDraft();rerenderDeliveryForm()}});
    document.addEventListener("input",e=>{if(e.target.dataset.checkField){const card=e.target.closest("[data-check-item]");updateCheckItem(Number(card.dataset.checkItem),e.target.dataset.checkField,e.target.value);refreshStatement()}if(e.target.hasAttribute("data-check-box-content")){const card=e.target.closest("[data-check-box]");updateCheckBox(Number(card.dataset.checkBox),"contents",e.target.value)}if(e.target.closest("#deliveryForm")){syncFormDraft();normalizeFormDraft();const total=formDraft.items.reduce((s,i)=>s+itemAmount(i),0)+Number(formDraft.previousBalance||0);if($("#formTotal"))$("#formTotal").textContent=money(total)+"원"}});
    setInterval(()=>saveAutoSnapshot(JSON.stringify(state),"5분 정기 자동 백업"),300000);
    document.addEventListener("visibilitychange",()=>{if(document.hidden)saveAutoSnapshot(JSON.stringify(state),"화면 종료 전 자동 백업")});
    render();startCloudSync();if(!state.profile.companyName||!state.profile.driverName||!state.profile.vehicleNumber)openSetup();
  })();
  </script>
</body>
</html>
