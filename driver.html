<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#123c5a">
  <title>배송 관리 관제탑</title>
  <script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    /* 5060 시니어 폰트 및 고대비 색상 적용 */
    :root{--navy:#123c5a;--teal:#0f8b82;--teal-dark:#086e68;--ink:#182833;--muted:#51626e;--line:#cbd6dc;--bg:#edf3f5;--warn:#d96c27;--danger:#b7453d;--white:#fff;--shadow:0 12px 35px rgba(23,54,72,.13)}
    *{box-sizing:border-box}html{background:var(--bg)}body{margin:0;color:var(--ink);background:var(--bg);font-family:Pretendard,"Noto Sans KR",Arial,sans-serif;-webkit-tap-highlight-color:transparent}button,input,select,textarea{font:inherit}button{cursor:pointer}button:disabled{cursor:not-allowed;opacity:.55}.app{width:min(100%,760px);min-height:100dvh;margin:auto;padding:0 0 92px;background:#f8fbfc;box-shadow:var(--shadow)}
    
    .top{position:sticky;top:0;z-index:10;padding:18px 20px;color:#fff;background:linear-gradient(135deg,var(--navy),#195d78)}.topline{display:flex;align-items:center;justify-content:space-between;gap:12px}.top h1{margin:3px 0 0;font-size:26px;font-weight:900}.top p{margin:5px 0 0;color:#d5e7ee;font-size:14px;font-weight:700}.top button{min-width:68px;min-height:46px;border:2px solid rgba(255,255,255,.45);border-radius:12px;color:#fff;background:rgba(255,255,255,.15);font-weight:900;font-size:14px}.datebar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px;padding-top:13px;border-top:1px solid rgba(255,255,255,.18)}.datebar input{min-height:44px;padding:0 12px;border:0;border-radius:10px;color:var(--navy);background:#fff;font-weight:900;font-size:15px}.autosave{font-size:13px;font-weight:900}
    main{padding:17px}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{padding:15px 8px;border:2px solid var(--line);border-radius:15px;background:#fff;text-align:center}.stat small{display:block;color:var(--muted);font-size:13px;font-weight:800}.stat strong{display:block;margin-top:5px;color:var(--navy);font-size:28px;font-weight:900}.section{margin-top:22px}.heading{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:12px}.heading h2{margin:0;font-size:21px;font-weight:900}.heading p{margin:4px 0 0;color:var(--muted);font-size:13px;font-weight:700}.heading-actions{display:flex;gap:6px}.mini,.small-primary{min-height:44px;padding:0 14px;border-radius:12px;font-size:14px;font-weight:900}.mini{border:2px solid #a3b8be;color:var(--navy);background:#fff}.small-primary{border:0;color:#fff;background:var(--teal)}
    
    .excel{width:100%;min-height:56px;margin-top:12px;border:0;border-radius:14px;color:#fff;background:var(--teal);font-weight:900;font-size:16px;box-shadow:0 4px 10px rgba(15,139,130,0.3)}.tank-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.tank{min-height:100px;padding:12px;border:2px solid #b2cfd8;border-radius:14px;background:#eef8fb}.tank strong{display:block;color:var(--navy);font-size:15px;font-weight:900}.tank p{margin:5px 0 0;color:#1e3a47;font-size:13px;font-weight:700;line-height:1.5}.empty{padding:26px 15px;border:1px dashed #bfced5;border-radius:16px;color:var(--muted);background:#fff;text-align:center;font-size:14px;font-weight:700}.stop-list,.customer-list{display:grid;gap:10px}.stop,.customer-row{display:flex;align-items:center;gap:12px;width:100%;padding:16px 14px;border:2px solid var(--line);border-radius:16px;background:#fff;text-align:left}.order{display:grid;place-items:center;flex:0 0 42px;height:42px;border-radius:12px;color:#fff;background:var(--navy);font-weight:900;font-size:18px}.stop-copy,.customer-copy{min-width:0;flex:1}.stop-copy strong,.customer-copy strong{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:18px;font-weight:900}.stop-copy small,.customer-copy small{display:block;margin-top:5px;color:var(--muted);font-size:13px;font-weight:700}.progress{flex:0 0 55px;color:var(--teal-dark);font-size:14px;font-weight:900;text-align:right}.completed{border-color:#76c3bc;background:#f0faf8}.completed .order{background:var(--teal)}.customer-row>button{min-height:42px;padding:0 12px;border:2px solid var(--line);border-radius:9px;color:var(--navy);background:#fff;font-size:13px;font-weight:900}.reorder{display:flex;gap:4px}.reorder select,.reorder button{height:42px;border:2px solid var(--line);border-radius:9px;background:#fff;font-size:13px;font-weight:900}.reorder button{width:42px}
    .settings-card{display:grid;gap:14px;padding:18px;border:2px solid var(--line);border-radius:17px;background:#fff}.field{display:grid;gap:6px}.field>span{font-size:14px;font-weight:900;color:var(--navy)}.field input,.field select,.field textarea{width:100%;min-height:52px;padding:12px;border:2px solid #b2c5cc;border-radius:12px;color:var(--ink);background:#fff;font-size:15px;font-weight:700}.field textarea{min-height:90px;resize:vertical}.two{display:grid;grid-template-columns:1fr 1fr;gap:9px}.primary,.outline,.danger,.warning{width:100%;min-height:56px;border-radius:14px;font-weight:900;font-size:16px}.primary{border:0;color:#fff;background:var(--teal);box-shadow:0 4px 12px rgba(15,139,130,0.25)}.outline{border:2px solid #abbec7;color:var(--navy);background:#fff}.danger{border:2px solid #e0aca8;color:#a33d36;background:#fff3f2}.warning{border:2px solid #efbd99;color:#98460f;background:#fff4eb}.backup-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.notice{padding:12px;border-radius:12px;color:#176d78;background:#eaf8f5;font-size:13px;line-height:1.5;font-weight:700}
    nav{position:fixed;right:0;bottom:0;left:0;z-index:20;display:grid;grid-template-columns:repeat(3,1fr);width:min(100%,760px);height:76px;margin:auto;padding-bottom:env(safe-area-inset-bottom);border-top:2px solid var(--line);background:#fff}nav button{border:0;color:#7b8a93;background:#fff;font-size:14px;font-weight:900}nav button span{display:block;margin-bottom:2px;font-size:22px}nav button.active{color:var(--teal)}
    dialog{width:min(calc(100% - 20px),700px);max-height:92dvh;padding:0;border:0;border-radius:22px;background:#fff;box-shadow:0 20px 70px rgba(8,37,53,.27)}dialog::backdrop{background:rgba(6,24,35,.54)}.modal-head{position:sticky;top:0;z-index:3;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 17px;border-bottom:2px solid var(--line);background:#fff}.modal-head h2{margin:0;font-size:22px;font-weight:900}.modal-head p{margin:5px 0 0;color:var(--muted);font-size:13px;font-weight:700}.close{flex:0 0 44px;height:44px;border:0;border-radius:50%;color:var(--navy);background:#edf3f5;font-size:26px;font-weight:900}.modal-body{display:grid;gap:13px;padding:16px}.sticky-save{position:sticky;bottom:0;z-index:2;box-shadow:0 -8px 20px rgba(255,255,255,.95)}
    .subhead{display:flex;align-items:flex-end;justify-content:space-between;margin-top:5px}.subhead strong{font-size:18px;font-weight:900;color:var(--navy)}.subhead small{color:var(--muted);font-size:12px;font-weight:700}.item-editor{display:grid;gap:10px;padding:14px;border:2px solid var(--line);border-radius:16px;background:#f8fbfc}.item-title{display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:900}.item-title button{border:0;color:var(--danger);background:transparent;font-size:13px;font-weight:900}.three{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:8px}.check-inline{display:flex;align-items:center;gap:10px;padding:12px;border:2px solid #eac89c;border-radius:12px;background:#fff9f1;font-size:14px;font-weight:900;color:#98460f}.check-inline input{width:24px;height:24px}.box-editor{display:grid;gap:8px}.box-row{display:grid;grid-template-columns:38px 1fr;align-items:center;gap:8px}.box-row b{display:grid;place-items:center;height:38px;border-radius:10px;color:#fff;background:var(--navy);font-size:15px}.box-row input{min-height:48px;padding:8px 12px;border:2px solid var(--line);border-radius:11px;font-size:14px;font-weight:700}
    .alert{padding:14px;border:2px solid #efb181;border-radius:14px;color:#91440e;background:#fff2e8;font-size:14px;line-height:1.5;font-weight:700}.check-list{display:grid;gap:9px}.check-row{display:flex;align-items:center;gap:12px;min-height:76px;padding:14px;border:2px solid var(--line);border-radius:15px;background:#fff}.check-row.checked{border-color:#82ce7a;background:#f0faf2}.check-row input{width:28px;height:28px;accent-color:var(--teal)}.check-copy{flex:1}.check-copy strong{font-size:16px;font-weight:900}.check-copy small{display:block;margin-top:4px;color:var(--muted);font-size:13px;font-weight:700;line-height:1.5}.tag{display:inline-block;margin-top:5px;padding:4px 8px;border-radius:7px;color:#9b5014;background:#fff0dc;font-size:11px;font-weight:900}
    
    .statement{padding:18px;border:2px solid var(--navy);border-radius:16px;background:#fff}.statement h1{margin:0;color:var(--navy);font-size:24px;font-weight:900}.statement-meta{display:grid;grid-template-columns:1fr 1fr;gap:5px 18px;margin:13px 0 17px;padding:12px 0;border-top:2px solid var(--navy);border-bottom:2px solid var(--line)}.statement-meta p{display:grid;grid-template-columns:68px 1fr;gap:7px;margin:0;font-size:13px;font-weight:700}.statement-meta p.address{grid-column:1/-1}.statement-meta span{color:var(--muted)}.statement-meta b{overflow-wrap:anywhere;color:var(--ink)}.line{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin:10px 0;padding-top:9px;border-top:1px dashed var(--line);font-size:13px;font-weight:700}.line b{white-space:nowrap;color:var(--navy)}.subtotal,.balance,.total{display:flex;justify-content:space-between;gap:10px;margin:9px 0;font-weight:900}.subtotal{padding-top:11px;border-top:1px dashed var(--line);font-size:14px}.balance{color:#ac581b;font-size:14px}.total{padding-top:11px;border-top:3px solid var(--navy);color:var(--navy);font-size:18px}.statement-note{padding-top:10px;border-top:1px dashed var(--line);color:var(--muted);font-size:12px;white-space:pre-wrap;font-weight:700}.output-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}.output-actions button{min-height:48px;border:2px solid #b8d7d3;border-radius:11px;color:var(--teal-dark);background:#eff9f7;font-size:14px;font-weight:900}.hidden{display:none!important}
    
    .network-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; background: rgba(0,0,0,0.3); font-size: 11px; font-weight: 900; color: #38bdf8; }
    .network-dot { width: 9px; height: 9px; background: #22c55e; border-radius: 50%; display: inline-block; }
    .network-dot.loading { background: #f59e0b; animation: blinkPulse 0.8s infinite; }
    @keyframes blinkPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .purchase-master-box { background: #fffbeb; border: 3px solid #f59e0b; border-left: 8px solid #f59e0b; padding: 18px; border-radius: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
    .prod-group-card { background: #ffffff; border: 2px solid #fde68a; padding: 12px; border-radius: 14px; margin-top: 10px; }
    .prod-group-title { font-size: 16px; font-weight: 900; color: var(--navy); border-bottom: 2px solid #fcd34d; padding-bottom: 4px; margin-bottom: 6px; }
    .prod-store-row { display: flex; justify-content: space-between; font-size: 14px; font-weight: 700; color: #334155; padding: 4px 0; border-bottom: 1px dashed #f1f5f9; }
    .prod-total-row { display: flex; justify-content: space-between; font-size: 16px; font-weight: 900; color: var(--danger); margin-top: 6px; padding-top: 4px; border-top: 1px solid #fcd34d; }

    .vibrate-alarm-banner { background: #e11d48; color: #ffffff; padding: 16px; text-align: center; font-size: 16px; font-weight: 900; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; gap: 10px; border-bottom: 3px solid #be123c; animation: blinkRed 0.6s infinite; }
    .vibrate-alarm-banner button { background: #ffffff; color: #e11d48; border: 0; padding: 8px 16px; border-radius: 10px; font-weight: 900; font-size: 14px; box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
    @keyframes blinkRed { 0%, 100% { background: #e11d48; } 50% { background: #9f1239; } }

    #cancelAlarmModal { position:fixed; inset:0; background:rgba(159, 18, 57, 0.95); z-index:99999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; text-align:center; animation: bgBlink 0.5s infinite alternate; }
    @keyframes bgBlink { 0% { background:rgba(159, 18, 57, 0.95); } 100% { background:rgba(0, 0, 0, 0.95); } }

    #mobileImagePopup { position:fixed; inset:0; background:rgba(15,23,42,0.94); z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:16px; }
    
    @media print {
      body { background: #fff !important; }
      .app, header, main, nav, dialog, #mobileImagePopup, #liveAlarmBanner, #cancelAlarmModal { display: none !important; }
      #printCaptureZone { display: block !important; position: absolute; top: 0; left: 0; width: 100%; padding: 10mm; background: #fff; }
      #statementPrint { display: block !important; }
    }
  </style>
</head>
<body>
  
  <div id="liveAlarmBanner" class="vibrate-alarm-banner hidden">
    <span>🚨 새 발주서가 실시간 접수되었습니다!</span>
    <button type="button" onclick="window.stopLiveOrderAlarm()">🔊 알림 끄기</button>
  </div>

  <div id="cancelAlarmModal" class="hidden">
      <div style="background:#fff; padding:30px; border-radius:24px; width:100%; max-width:400px; box-shadow:0 12px 35px rgba(0,0,0,0.5);">
          <span style="font-size:50px;">🚨</span>
          <h2 style="color:#e11d48; font-size:28px; font-weight:900; margin:10px 0;">발주 취소 긴급알림</h2>
          <p id="cancelAlarmStoreName" style="font-size:24px; font-weight:900; color:#182833; margin:15px 0; background:#fee2e2; padding:10px; border-radius:12px; border:2px solid #fda4af;">점포명</p>
          <p style="font-size:16px; font-weight:900; color:#9f1239; line-height:1.4; margin-bottom:20px;">방금 점주님이 발주를 취소했습니다!<br>절대 물건을 싣거나 배송하지 마세요!</p>
          <button type="button" onclick="window.stopCancelAlarm()" style="width:100%; min-height:60px; background:#e11d48; color:#fff; font-size:18px; font-weight:900; border:0; border-radius:14px; box-shadow:0 4px 12px rgba(225, 29, 72, 0.4);">확인했습니다 (알림 끄기)</button>
      </div>
  </div>

  <div class="app">
    <header class="top">
      <div class="topline">
        <div>
          <h1 id="headerCompany">회사명 입력</h1>
          <div style="display:flex; align-items:center; gap:8px; margin-top:4px;">
            <p id="headerDriver" style="margin:0;">차량 호차 미입력 · 배송담당자 미입력</p>
            <span class="network-badge"><span class="network-dot" id="netDot"></span><span id="netText">실시간 동기화중</span></span>
          </div>
        </div>
        <button type="button" data-nav="settings">설정</button>
      </div>
      <div class="datebar"><input id="workDate" type="date" aria-label="업무 날짜"><span class="autosave">● 무선 자동저장</span></div>
    </header>
    
    <main>
      <div id="consolidatedZone" class="no-print"></div>

      <section id="todayView"></section>
      <section id="customersView" class="hidden"></section>
      <section id="settingsView" class="hidden"></section>
    </main>
    
    <nav aria-label="주요 메뉴">
      <button type="button" class="active" data-nav="today"><span>✓</span>배송</button>
      <button type="button" data-nav="customers"><span>▤</span>거래처</button>
      <button type="button" data-nav="settings"><span>⚙</span>설정</button>
    </nav>
  </div>

  <dialog id="customerDialog"></dialog>
  <dialog id="deliveryDialog"></dialog>
  <dialog id="checklistDialog"></dialog>
  <input id="restoreInput" class="hidden" type="file" accept="application/json,.json">

  <div id="printCaptureZone" class="hidden" style="background:#fff; color:#000;"></div>

  <div id="mobileImagePopup" class="hidden">
    <div style="background:#fff; width:min(100%, 420px); padding:22px; border-radius:24px; text-align:center; box-shadow:var(--shadow);">
      <p id="popupTitle" style="font-size:18px; font-weight:900; color:var(--navy); margin:0 0 8px 0;">📸 이미지 저장</p>
      <p style="font-size:13px; font-weight:700; color:var(--muted); margin-bottom:15px;">아래 <span style="color:#10b981;">[사진첩 바로 저장]</span> 버튼을 누르거나<br>사진을 <span style="color:var(--danger); font-weight:900; text-decoration:underline;">2초간 꾹 눌러서</span> 기기에 보관하세요!</p>
      <div style="border:2px solid var(--line); border-radius:14px; overflow:hidden; margin-bottom:16px; background:#fff; max-height:45dvh; overflow-y:auto;">
        <img id="popupImg" src="" alt="저장용이미지" style="width:100%; height:auto; display:block;">
      </div>
      <div style="display:flex; flex-direction:column; gap:8px;">
        <button type="button" onclick="window.downloadDirectToGallery()" style="width:100%; min-height:54px; background:#10b981; color:#fff; font-weight:900; border:0; border-radius:14px; font-size:16px; box-shadow:0 4px 10px rgba(16,185,129,0.3);">📥 사진첩에 바로 다운로드</button>
        <button type="button" onclick="document.getElementById('mobileImagePopup').classList.add('hidden')" style="width:100%; min-height:52px; background:var(--navy); color:#fff; font-weight:900; border:0; border-radius:14px; font-size:16px;">닫기 (관제탑 복귀)</button>
      </div>
    </div>
  </div>

  <script>
  (()=>{
    "use strict";
    const STORAGE_KEY="jangbaek_delivery_html_v1";
    const CLOUD_RELAY_URL = "https://ntfy.sh/fish_net_relay_"; 

    const categories=["활어","패류","냉동제품","필렛 제품"];
    const species=["광어","도미","농어","점성어","연어","우니(성게알)","전복","백상합","멍게","개불","소라","해삼","가리비","기타"];
    const origins=["대한민국","일본","중국","러시아","노르웨이","칠레","캐나다","미국","호주","뉴질랜드","베트남","태국","인도네시아","필리핀","대만","페루","멕시코","기타"];
    const $=s=>document.querySelector(s);
    const money=n=>new Intl.NumberFormat("ko-KR").format(Math.round(Number(n)||0));
    const id=()=>Date.now()+Math.floor(Math.random()*100000);
    
    // 🚨 [날짜 일치 패치]: 배송원 관제탑도 점주와 똑같이 기본 활성화 날짜를 '내일(익일)'로 강제 일치
    const dateTomorrowLocal=()=>{
      const d=new Date();
      d.setDate(d.getDate() + 1);
      const o=d.getTimezoneOffset()*60000;
      return new Date(d-o).toISOString().slice(0,10);
    };
    const dateLocal=()=>{const d=new Date(),o=d.getTimezoneOffset()*60000;return new Date(d-o).toISOString().slice(0,10)};
    const esc=v=>String(v??"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));
    const safeName=v=>String(v||"배송").replace(/[\\/:*?"<>|]/g,"_");
    
    let state=load();
    let view="today";
    let workDate=dateTomorrowLocal(); // 🚨 익일 날짜 기본 세팅 완료
    let customerEditId=null;
    let deliveryEditId=null;
    let selectedDeliveryId=null;
    
    let customerReorder=false;
    let deliveryReorder=false;

    let syncIntervalTimer=null; 
    let isAlarmPlaying = false; 
    let alarmIntervalPointer = null; 
    
    let isCancelAlarmPlaying = false;
    let cancelAlarmInterval = null;

    window.currentDownloadName = `거래명세서_${dateLocal()}.png`;

    if(!localStorage.getItem('driver_acked_cancels')) localStorage.setItem('driver_acked_cancels', JSON.stringify([]));

    function emptyState(){return{profile:{companyName:"",driverName:"",vehicleNumber:""},customers:[],deliveries:[]}}
    function load(){try{const data=JSON.parse(localStorage.getItem(STORAGE_KEY)||"null");return data&&data.profile&&Array.isArray(data.customers)&&Array.isArray(data.deliveries)?data:emptyState()}catch{return emptyState()}}
    function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));renderHeader()}
    function byOrder(a,b){return(Number(a.routeOrder)||999)-(Number(b.routeOrder)||999)||a.id-b.id}
    function customers(){return[...state.customers].sort(byOrder)}
    function deliveries(){return state.deliveries.filter(d=>d.deliveryDate===workDate).sort(byOrder)}
    function customerOf(d){return state.customers.find(c=>c.id===d.customerId)||{name:d.fallbackStoreName||"알 수 없는 매장",deliveryPlace:"",address:"",phone:""}}
    
    function itemQty(i){return i.category==="냉동제품"?`${i.requestedQty||0}팩`:i.actualWeight?`${i.actualWeight}kg`:`${i.requestedQty||0}${i.unit||"마리"}`}
    
    function baseAmount(i){
      if(i.category==="냉동제품") return (Number(i.requestedQty)||0)*(Number(i.unitPrice)||0);
      const w = i.actualWeight ? Number(i.actualWeight) : Number(i.requestedQty);
      return (w||0)*(Number(i.unitPrice)||0);
    }
    function itemAmount(i){
      const w = i.actualWeight ? Number(i.actualWeight) : Number(i.requestedQty);
      return baseAmount(i) + (i.category==="필렛 제품"?(w||0)*(Number(i.processingFeePerKg)||0):0);
    }

    function calcLiveTotal() {
        if(!$("#deliveryDialog").open) return;
        syncDraft();
        const d = $("#deliveryDialog")._draft;
        const fd = Object.fromEntries(new FormData($("#deliveryForm")));
        const prev = Math.max(0, Number(fd.previousBalance)||0);
        let sum = 0;
        d.items.forEach(i => sum += itemAmount(i));
        const totalEl = document.getElementById("liveTotalWon");
        if(totalEl) totalEl.innerText = money(sum + prev) + "원";
    }

    function progress(d){const all=[...(d.items||[]),...(d.boxes||[])],done=all.filter(x=>x.checked).length;return{done,total:all.length}}

    function renderHeader(){
      if(!$("#workDate")) return;
      $("#headerCompany").textContent=state.profile.companyName||"회사명 입력";
      $("#headerDriver").textContent=`${state.profile.vehicleNumber||"차량 호차 미입력"} · ${state.profile.driverName||"배송담당자 미입력"}`;
      $("#workDate").value=workDate;
    }
    
    function setView(next){view=next;document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("active",b.dataset.nav===view));$("#todayView").classList.toggle("hidden",view!=="today");$("#customersView").classList.toggle("hidden",view!=="customers");$("#settingsView").classList.toggle("hidden",view!=="settings");render()}
    function render(){renderHeader();if(view==="today")renderToday();if(view==="customers")renderCustomers();if(view==="settings")renderSettings()}

    function renderToday(){
      const rows=deliveries(),ready=rows.filter(d=>d.status!=="completed"&&d.status!=="cancelled").length,complete=rows.filter(d=>d.status==="completed").length,boxes=rows.reduce((s,d)=>s+(d.boxes||[]).length,0);
      const tanks=Array.from({length:6},(_,x)=>{const n=x+1,loads=rows.flatMap(d=>(d.items||[]).filter(i=>Number(i.tankNumber)===n&&d.status!=="cancelled").map(i=>`${customerOf(d).name} · ${i.species} ${itemQty(i)}`));return`<div class="tank"><strong>${n}번 수조</strong><p>${loads.length?loads.map(esc).join("<br>"):"비어 있음"}</p></div>`}).join("");
      
      const stops=rows.length?rows.map((d, index)=>{
          const c=customerOf(d);
          
          if (d.status === "cancelled") {
              return `
                <div class="stop" style="display:flex; flex-direction:column; padding:0; background:#fff1f2; border:3px solid var(--danger); border-radius:16px; margin-bottom:10px; overflow:hidden;">
                  <div style="padding:20px; text-align:center;">
                    <span style="display:inline-block; background:var(--danger); color:#fff; padding:6px 12px; border-radius:8px; font-weight:900; font-size:16px; margin-bottom:10px;">🛑 발주 전면 취소됨</span>
                    <strong style="display:block; font-size:24px; color:var(--danger);">${esc(c.name)}</strong>
                    <p style="margin:12px 0 16px 0; font-size:15px; font-weight:900; color:#9f1239; line-height:1.4;">점주가 발주를 취소했습니다.<br>절대 물건을 싣거나 배송하지 마세요!</p>
                    <button type="button" data-ack-cancel="${d.id}" style="width:100%; min-height:54px; background:var(--danger); color:#fff; border:0; border-radius:12px; font-size:16px; font-weight:900; box-shadow:0 4px 10px rgba(183, 69, 61, 0.3);">확인완료 (목록에서 삭제)</button>
                  </div>
                </div>
              `;
          }

          const p=progress(d),names=(d.items||[]).map(i=>i.species).slice(0,3).join(" · ");
          const naviUrl = `https://map.kakao.com/link/search/${encodeURIComponent(c.address || c.name)}`;
          
          if (deliveryReorder) {
            return `
              <div class="stop" style="display:flex; justify-content:space-between; align-items:center; background:#fff; border:2px solid var(--warn); border-radius:16px; padding:12px; margin-bottom:8px;">
                <div style="display:flex; align-items:center; gap:10px;">
                  <span class="order" style="background:var(--warn);">${d.routeOrder}</span>
                  <div style="line-height:1.2;">
                    <strong style="font-size:16px;">${esc(c.name)}</strong><br>
                    <small style="font-size:12px; color:var(--muted);">${esc(names||"")}</small>
                  </div>
                </div>
                <div class="reorder" style="display:flex; gap:6px;">
                  <button type="button" data-delete-delivery="${d.id}" style="color:var(--danger); border-color:var(--danger); font-weight:900;">삭제</button>
                  <button type="button" data-move-delivery="${d.id}" data-dir="-1" ${index===0?"disabled":""}>↑</button>
                  <button type="button" data-move-delivery="${d.id}" data-dir="1" ${index===rows.length-1?"disabled":""}>↓</button>
                </div>
              </div>
            `;
          } else {
            return `
              <div class="stop ${d.status==="completed"?"completed":""}" style="display:flex; flex-direction:column; padding:0; background:#fff; border:2px solid var(--line); border-radius:16px; margin-bottom:10px; overflow:hidden;">
                <button type="button" data-open-check="${d.id}" style="display:flex; align-items:center; gap:12px; width:100%; padding:16px 14px; border:0; background:transparent; text-align:left;">
                  <span class="order">${d.routeOrder}</span>
                  <span class="stop-copy"><strong style="font-size:18px;">${esc(c.name)}</strong><small style="font-size:13px;">${esc(names||"품목 없음")}${(d.boxes||[]).length?` · ${d.boxes.length}박스`:""}</small></span>
                  <span class="progress">${p.done}/${p.total}</span>
                </button>
                <div class="no-print" style="display:grid; grid-template-columns:1fr 1fr; border-top:2px solid var(--line); background:#f8fbfc;">
                  <a href="${naviUrl}" target="_blank" style="text-align:center; padding:12px; font-size:14px; font-weight:900; color:var(--navy); text-decoration:none; border-right:2px solid var(--line);">🗺️ 내비게이션 연동</a>
                  <button type="button" data-open-check="${d.id}" style="border:0; background:transparent; font-size:14px; font-weight:900; color:var(--teal); padding:12px;">📋 하차 체크리스트</button>
                </div>
              </div>
            `;
          }
      }).join("") : `<div class="empty">내일 등록된 배송이 없습니다.<br>점주 앱에서 발주를 전송하면 실시간 노출됩니다.</div>`;

      $("#todayView").innerHTML=`<div class="stats"><div class="stat"><small>출차 준비</small><strong>${ready}</strong></div><div class="stat"><small>배송 완료</small><strong>${complete}</strong></div><div class="stat"><small>전체 박스</small><strong>${boxes}</strong></div></div><button class="excel" type="button" data-export-excel ${rows.length?"":"disabled"}>↓ 당일 전체 거래명세표 Excel 저장</button><div class="section"><div class="heading"><div><h2>1톤 차량 수조 현황</h2><p>상차한 어종·패류의 수조 위치입니다.</p></div></div><div class="tank-grid">${tanks}</div></div><div class="section"><div class="heading"><div><h2>배송 순서</h2><p>포장 내용과 하차 물품을 확인하세요.</p></div><div class="heading-actions">${rows.length > 0 ? `<button class="mini" type="button" data-reorder-deliveries style="border-color:var(--warn); color:var(--warn);">${deliveryReorder ? "완료" : "순서/삭제"}</button>` : ""}<button type="button" class="small-primary" data-new-delivery ${state.customers.length?"":"disabled"}>📞 수동 주문 추가</button></div></div><div class="stop-list">${stops}</div></div>`;
      
      renderConsolidatedPurchaseView(rows);
    }

    function moveDelivery(deliveryId, target) {
        const list = deliveries();
        const i = list.findIndex(d => d.id === deliveryId);
        const to = Math.max(0, Math.min(list.length - 1, target));
        if (i < 0 || i === to) return;
        const [m] = list.splice(i, 1);
        list.splice(to, 0, m);
        list.forEach((d, x) => {
            const real = state.deliveries.find(r => r.id === d.id);
            real.routeOrder = x + 1;
        });
        save();
        renderToday();
    }

    function renderConsolidatedPurchaseView(rows) {
      const activeRows = rows.filter(d => d.status !== "completed" && d.status !== "cancelled");
      if(!activeRows.length) { $("#consolidatedZone").innerHTML = ""; return; }

      let consolidatedMap = {};
      activeRows.forEach(d => {
        const c = customerOf(d);
        (d.items || []).forEach(item => {
          const fishName = item.species || "기타";
          const fishSize = item.size || "기본 규격";
          const fishUnit = item.unit || "마리";
          const fishQty = Number(item.requestedQty) || 0;
          const groupKey = `${fishName}_||_${fishSize}_||_${fishUnit}`;
          if(!consolidatedMap[groupKey]) { consolidatedMap[groupKey] = { name: fishName, size: fishSize, unit: fishUnit, stores: [] }; }
          consolidatedMap[groupKey].stores.push({ storeName: c.name, qty: fishQty });
        });
      });

      let injectHtml = "";
      Object.values(consolidatedMap).forEach(prod => {
        let storeLines = ""; let productSum = 0;
        prod.stores.forEach(s => { productSum += s.qty; storeLines += `<div class="prod-store-row"><span>🏠 ${esc(s.storeName)}</span><span>${s.qty} ${esc(prod.unit)}</span></div>`; });
        injectHtml += `<div class="prod-group-card"><div class="prod-group-title">🐟 ${esc(prod.name)} <span style="font-size:13px; color:var(--muted); font-weight:bold;">[${esc(prod.size)}]</span></div><div style="padding:2px 8px;">${storeLines}</div><div class="prod-total-row"><span>🔥 최종 매입 총 수량:</span><span>${productSum} ${esc(prod.unit)}</span></div></div>`;
      });

      $("#consolidatedZone").innerHTML = `
        <div id="consolidatedPrintArea" class="purchase-master-box">
          <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #f59e0b; padding-bottom:6px; margin-bottom:10px;">
            <strong style="color:#b45309; font-size:16px;">📋 구매담당자 제출용 [당일 매입발주서]</strong>
            <div style="display:flex; gap:6px;">
              <button type="button" class="no-print" onclick="window.saveConsolidatedImage()" style="min-height:38px; padding:0 12px; background:#0f8b82; color:#fff; border:0; border-radius:8px; font-weight:900; font-size:13px;">📸 사진 저장</button>
              <button type="button" class="no-print" onclick="window.printConsolidatedDocOnly()" style="min-height:38px; padding:0 12px; background:#f59e0b; color:#fff; border:0; border-radius:8px; font-weight:900; font-size:13px;">🖨️ 인쇄</button>
            </div>
          </div>
          <div style="display:grid; gap:8px;">${injectHtml}</div>
        </div>
      `;
    }

    window.printConsolidatedDocOnly = () => {
      const zone = $("#consolidatedPrintArea").innerHTML;
      const captureZone = document.getElementById('printCaptureZone');
      captureZone.innerHTML = `<div class="statement" style="border:3px solid #000; padding:20px; border-radius:0;">${zone}</div>`;
      const noPrintBtns = captureZone.querySelectorAll('.no-print');
      noPrintBtns.forEach(btn => btn.style.display = 'none');
      window.print();
    };

    window.saveConsolidatedImage = async function() {
        if(typeof html2canvas!=="function") return alert("이미지 모듈을 불러오지 못했습니다.");
        const zone = document.getElementById("consolidatedPrintArea");
        const btns = zone.querySelectorAll('.no-print');
        btns.forEach(b => b.style.display = 'none');
        
        setTimeout(async () => {
            try {
                const canvas = await html2canvas(zone, {scale:2, backgroundColor:"#fffbeb", scrollX:0, scrollY:0, useCORS:true});
                const base64Data = canvas.toDataURL("image/png", 0.95);
                document.getElementById("popupTitle").innerText = "📸 매입발주서 저장";
                document.getElementById("popupImg").src = base64Data;
                window.currentDownloadName = `당일_매입발주서_${dateLocal()}.png`;
                document.getElementById("mobileImagePopup").classList.remove("hidden");
            } catch(e) { alert("이미지 변환 중 오류가 발생했습니다."); } 
            finally { btns.forEach(b => b.style.display = ''); }
        }, 150);
    };

    window.openChecklistInline = (delId) => { selectedDeliveryId = delId; openChecklist(delId); };

    function renderCustomers(){
      const list=customers();
      $("#customersView").innerHTML=`<div class="heading"><div><h2>내 거래처</h2><p>거래처명·납품처·주소·연락처와 기본 순서를 관리합니다.</p></div><div class="heading-actions">${list.length>1?`<button class="mini" type="button" data-reorder-customers>${customerReorder?"변경 완료":"순서 변경"}</button>`:""}<button class="small-primary" type="button" data-new-customer>＋ 추가</button></div></div><div class="customer-list">${list.length?list.map((c,i)=>`<div class="customer-row"><span class="order">${i+1}</span><span class="customer-copy"><strong>${esc(c.name)}</strong><small>${esc(c.deliveryPlace||c.address||`기본 배송순서 ${i+1}`)}</small></span>${customerReorder?`<span class="reorder"><select data-customer-position="${c.id}" aria-label="${esc(c.name)} 순서">${list.map((_,p)=>`<option value="${p+1}" ${p===i?"selected":""}>${p+1}번</option>`).join("")}</select><button type="button" data-move-customer="${c.id}" data-dir="-1" ${i===0?"disabled":""}>↑</button><button type="button" data-move-customer="${c.id}" data-dir="1" ${i===list.length-1?"disabled":""}>↓</button></span>`:`<button type="button" data-edit-customer="${c.id}">수정</button>`}</div>`).join(""):`<div class="empty">등록된 거래처가 없습니다.</div>`}</div>`;
    }
    
    function renderSettings(){
      $("#settingsView").innerHTML=`<div class="heading"><div><h2>회사·차량 정보</h2><p>입력한 내용은 화면과 Excel에 표시됩니다.</p></div></div><form id="settingsForm" class="settings-card"><label class="field"><span>회사명</span><input name="companyName" value="${esc(state.profile.companyName)}" placeholder="예: 장백수산"></label><label class="field"><span>배송담당자 이름</span><input name="driverName" value="${esc(state.profile.driverName)}" placeholder="예: 홍길동"></label><label class="field"><span>차량 호차 (숫자 전용)</span><input name="vehicleNumber" value="${esc(state.profile.vehicleNumber)}" placeholder="예: 1"></label><button class="primary" type="submit">회사·차량 정보 저장</button><div class="notice">휴대폰 변경이나 브라우저 초기화 전에 반드시 백업 파일을 저장해 주세요.</div><div class="backup-actions"><button class="outline" type="button" data-backup>백업 저장</button><button class="outline" type="button" data-restore>백업 복원</button></div></form>`;
    }

    function openCustomer(customerId){
      customerEditId=customerId||null;const c=state.customers.find(x=>x.id===customerId)||{name:"",deliveryPlace:"",address:"",phone:"",routeOrder:customers().length+1};
      const dlg=$("#customerDialog");dlg.innerHTML=`<div class="modal-head"><div><h2>${customerId?"거래처 수정":"거래처 등록"}</h2><p>거래처와 실제 납품처 상세 정보를 입력합니다.</p></div><button class="close" type="button" data-close>×</button></div><form id="customerForm" class="modal-body"><label class="field"><span>거래처명 (필수)</span><input name="name" required value="${esc(c.name)}" placeholder="예: 동해횟집 본점"></label><label class="field"><span>납품처</span><input name="deliveryPlace" value="${esc(c.deliveryPlace)}" placeholder="예: 동해횟집 강남점"></label><label class="field"><span>주소</span><input name="address" value="${esc(c.address)}" placeholder="예: 서울시 강남구 테헤란로 00"></label><label class="field"><span>연락처</span><input name="phone" type="tel" value="${esc(c.phone)}" placeholder="예: 010-1234-5678"></label><label class="field"><span>기본 배송순서</span><select name="routeOrder">${Array.from({length:Math.max(1,customers().length+(customerId?0:1))},(_,i)=>`<option value="${i+1}" ${Number(c.routeOrder)===i+1?"selected":""}>${i+1}번</option>`).join("")}</select></label><button class="primary sticky-save" type="submit">${customerId?"변경 내용 저장":"거래처 저장"}</button>${customerId?`<button class="danger" type="button" data-delete-customer="${customerId}">거래처 삭제</button>`:""}</form>`;dlg.showModal();
    }
    
    function saveCustomer(form){
      const data=Object.fromEntries(new FormData(form));const value={name:String(data.name).trim(),deliveryPlace:String(data.deliveryPlace).trim(),address:String(data.address).trim(),phone:String(data.phone).trim(),routeOrder:Number(data.routeOrder)||1};if(!value.name)return;
      if(customerEditId){const i=state.customers.findIndex(c=>c.id===customerEditId);state.customers[i]={...state.customers[i],...value}}else state.customers.push({id:id(),...value});normalizeCustomerOrder();save();$("#customerDialog").close();renderCustomers();
    }
    
    function normalizeCustomerOrder(){customers().forEach((c,i)=>{c.routeOrder=i+1})}
    function moveCustomer(customerId,target){const list=customers(),i=list.findIndex(c=>c.id===customerId),to=Math.max(0,Math.min(list.length-1,target));if(i<0||i===to)return;const [m]=list.splice(i,1);list.splice(to,0,m);list.forEach((c,x)=>{const real=state.customers.find(r=>r.id===c.id);real.routeOrder=x+1;state.deliveries.filter(d=>d.customerId===c.id&&d.deliveryDate===workDate).forEach(d=>d.routeOrder=x+1)});save();renderCustomers()}

    function blankItem(){return{id:id(),category:"활어",species:"광어",size:"기본 규격",originCountry:"",requestedQty:1,unit:"마리",actualWeight:"",unitPrice:"",processingFeePerKg:"",processing:"찍어바리",tankNumber:0,rubberBand:false,rubberBandQuantity:"",rubberBandColor:"",includedNote:"",checked:false}}
    
    function openDelivery(deliveryId){
      deliveryEditId=deliveryId||null;const first=customers()[0];if(!first)return alert("거래처를 먼저 등록해 주세요.");const old=state.deliveries.find(d=>d.id===deliveryId);const d=old?JSON.parse(JSON.stringify(old)):{customerId:first.id,deliveryDate:workDate,routeOrder:first.routeOrder,notes:"",coPackNote:"",previousBalance:"",status:"ready",items:[blankItem()],boxes:[]};
      const dlg=$("#deliveryDialog");dlg.innerHTML=`<div class="modal-head"><div><h2>${deliveryId?"수동 발주 수정":"수동 발주 입력"}</h2><p>수동 발주 내용을 직접 입력합니다.</p></div><button class="close" type="button" data-close>×</button></div><form id="deliveryForm" class="modal-body"><label class="field"><span>거래처</span><select name="customerId">${customers().map(c=>`<option value="${c.id}" ${c.id===d.customerId?"selected":""}>${esc(c.name)}</option>`).join("")}</select></label><div class="two"><label class="field"><span>배송일</span><input name="deliveryDate" type="date" value="${d.deliveryDate}"></label><label class="field"><span>당일 배송순서</span><input name="routeOrder" type="number" min="1" value="${d.routeOrder}"></label></div><div class="subhead"><strong>어종·제품</strong><button class="mini" type="button" data-add-item>＋ 품목 추가</button></div><div id="itemEditors"></div><div class="subhead"><strong>박스 및 동봉품</strong></div><label class="field"><span>총 박스 수</span><input id="boxCount" type="number" min="0" max="20" value="${d.boxes.length}"></label><div id="boxEditors" class="box-editor"></div><label class="field"><span>동봉품 메모</span><textarea name="coPackNote">${esc(d.coPackNote)}</textarea></label><label class="field"><span>전날 미수금액</span><input name="previousBalance" type="number" min="0" value="${d.previousBalance||""}"></label><label class="field"><span>전체 메모</span><textarea name="notes">${esc(d.notes)}</textarea></label><div style="margin-top:10px; padding:16px; background:#effaf8; border:2px solid var(--teal); border-radius:12px; display:flex; justify-content:space-between; align-items:center; font-size:16px; font-weight:900; color:var(--teal-dark);"><span>실시간 계산 합계금액</span><b id="liveTotalWon" style="font-size:22px;">0원</b></div><button class="primary sticky-save" type="submit">저장</button></form>`;
      dlg._draft=d;renderItemEditors();renderBoxEditors();dlg.showModal();

      const fetchExecute = () => {
        const carCode = String(state.profile.vehicleNumber || "").trim().replace(/[^a-zA-Z0-9_-]/g, '');
        if(!carCode) {
          $("#netDot").className = "network-dot loading"; $("#netText").textContent = "호차 미설정"; return;
        }
        $("#netDot").className = "network-dot loading"; $("#netText").textContent = "수신중...";
        
        fetch(`${CLOUD_RELAY_URL}${carCode}/json?poll=1`)
        .then(res => res.text())
        .then(text => {
          $("#netDot").className = "network-dot"; $("#netText").textContent = `정상 수신중`;
          if(!text.trim()) return;
          const lines = text.trim().split('\n'); let isDataChanged = false;
          
          const ackedCancels = JSON.parse(localStorage.getItem('driver_acked_cancels') || '[]');

          lines.forEach(line => {
            try {
              const rawData = JSON.parse(line); if(!rawData.message) return;
              const packet = JSON.parse(rawData.message);
              if(!packet.orderId) return;

              if(ackedCancels.includes(packet.orderId)) return;

              const existingIdx = state.deliveries.findIndex(d => d.cloudOrderId === packet.orderId);
              
              if (packet.status === "cancelled") {
                  if (existingIdx !== -1 && state.deliveries[existingIdx].status !== "cancelled") {
                      state.deliveries[existingIdx].status = "cancelled";
                      isDataChanged = true;
                      triggerCancelAlarm(packet.store);
                  }
                  return;
              }

              if (packet.status === "ordered") {
                  if (existingIdx !== -1) return;

                  let targetCustomer = state.customers.find(c => c.name === packet.store.trim());
                  if(!targetCustomer) {
                    targetCustomer = { id: id(), name: packet.store.trim(), deliveryPlace: packet.store.trim(), address: packet.address || "", phone: packet.phone || "", routeOrder: customers().length + 1 };
                    state.customers.push(targetCustomer);
                  }

                  const mappedItems = packet.items.map(pi => ({
                    id: id(), category: pi.category || "활어", species: pi.item || "광어", size: pi.size || "기본 규격", originCountry: pi.origin || "국내산", requestedQty: Number(pi.qty) || 1, unit: pi.unit || "마리", actualWeight: "", unitPrice: "", processingFeePerKg: "0", processing: pi.process || "찍어바리",
                    tankNumber: 0, rubberBand: false, rubberBandQuantity: "", rubberBandColor: "", includedNote: pi.memo || "", checked: false
                  }));

                  const initialBoxes = [];
                  const hasBoxOption = packet.items.some(pi => pi.unit === "박스");
                  if (hasBoxOption) {
                    initialBoxes.push({ id: id(), boxNumber: 1, contents: "주문 수산 박스 물품", checked: false });
                  }

                  const newDelivery = {
                    id: id(), cloudOrderId: packet.orderId, customerId: targetCustomer.id, fallbackStoreName: packet.store.trim(), 
                    deliveryDate: workDate, routeOrder: targetCustomer.routeOrder, 
                    notes: (packet.orderDate && packet.orderDate !== workDate) ? `⚠️ [점주 지정 배송요청일: ${packet.orderDate}]` : "", 
                    coPackNote: "", previousBalance: "0", status: "ready",
                    items: mappedItems, boxes: initialBoxes
                  };

                  state.deliveries.push(newDelivery); isDataChanged = true;
              }
            } catch(e){}
          });
          if(isDataChanged) { 
            save(); render(); 
            if(state.deliveries.some(d => d.status === "ready" && !d.alarmTriggered && d.cloudOrderId)) {
               triggerLiveNetworkHardwareAlarm();
               state.deliveries.forEach(d => { if(d.cloudOrderId) d.alarmTriggered = true; });
            }
          }
        }).catch(err => { $("#netDot").className = "network-dot loading"; $("#netText").textContent = "오프라인"; });
      };
      fetchExecute(); syncIntervalTimer = setInterval(fetchExecute, 4000);
    }

    document.addEventListener("click",e=>{
      const b=e.target.closest("button");if(!b)return;
      
      if(b.dataset.ackCancel){
          const dId = Number(b.dataset.ackCancel);
          const targetD = state.deliveries.find(d => d.id === dId);
          if (targetD && targetD.cloudOrderId) {
              let acked = JSON.parse(localStorage.getItem('driver_acked_cancels') || '[]');
              if (!acked.includes(targetD.cloudOrderId)) {
                  acked.push(targetD.cloudOrderId);
                  localStorage.setItem('driver_acked_cancels', JSON.stringify(acked));
              }
          }
          state.deliveries = state.deliveries.filter(d => d.id !== dId);
          save(); render(); return;
      }

      if(b.hasAttribute("data-reorder-deliveries")){deliveryReorder=!deliveryReorder;return renderToday();}
      if(b.dataset.moveDelivery){return moveDelivery(Number(b.dataset.moveDelivery),deliveries().findIndex(d=>d.id===Number(b.dataset.moveDelivery))+Number(b.dataset.dir));}

      if(b.dataset.nav){setView(b.dataset.nav);return}
      if(b.hasAttribute("data-close")){b.closest("dialog").close();return}
      if(b.hasAttribute("data-new-customer"))return openCustomer();
      if(b.dataset.editCustomer)return openCustomer(Number(b.dataset.editCustomer));
      if(b.hasAttribute("data-reorder-customers")){customerReorder=!customerReorder;return renderCustomers()}
      if(b.dataset.moveCustomer)return moveCustomer(Number(b.dataset.moveCustomer),customers().findIndex(c=>c.id===Number(b.dataset.moveCustomer))+Number(b.dataset.dir));
      
      if(b.dataset.deleteCustomer){const cid=Number(b.dataset.deleteCustomer);if(state.deliveries.some(d=>d.customerId===cid))return alert("이 거래처의 배송 기록이 있어 삭제할 수 없습니다. 배송 기록을 먼저 삭제해 주세요.");if(confirm("이 거래처를 삭제할까요?")){state.customers=state.customers.filter(c=>c.id!==cid);normalizeCustomerOrder();save();$("#customerDialog").close();renderCustomers()}return}
      
      if(b.hasAttribute("data-new-delivery"))return openDelivery();
      if(b.dataset.openCheck)return openChecklist(Number(b.dataset.openCheck));
      if(b.hasAttribute("data-add-item")){syncDraft();$("#deliveryDialog")._draft.items.push(blankItem());return renderItemEditors()}
      if(b.dataset.removeItem!==undefined){syncDraft();const d=$("#deliveryDialog")._draft;if(d.items.length===1)return alert("품목은 한 개 이상 필요합니다.");d.items.splice(Number(b.dataset.removeItem),1);return renderItemEditors()}
      if(b.dataset.editDelivery){$("#checklistDialog").close();return openDelivery(Number(b.dataset.editDelivery))}
      
      if(b.dataset.deleteDelivery){
        if(confirm("해당 배송 기록을 영구 삭제할까요?")){
            const dId = Number(b.dataset.deleteDelivery);
            const targetD = state.deliveries.find(d => d.id === dId);
            if (targetD && targetD.cloudOrderId) {
                let acked = JSON.parse(localStorage.getItem('driver_acked_cancels') || '[]');
                if (!acked.includes(targetD.cloudOrderId)) {
                    acked.push(targetD.cloudOrderId);
                    localStorage.setItem('driver_acked_cancels', JSON.stringify(acked));
                }
            }
            state.deliveries = state.deliveries.filter(d => d.id !== dId);
            save();$("#checklistDialog").close();render();
        }
        return;
      }
      
      if(b.dataset.complete){const d=state.deliveries.find(x=>x.id===Number(b.dataset.complete));d.status="completed";d.completedAt=new Date().toISOString();save();$("#checklistDialog").close();render();return}
      if(b.dataset.cancelComplete){if(confirm("하차 완료를 취소하고 모든 체크를 초기화할까요?")){const d=state.deliveries.find(x=>x.id===Number(b.dataset.cancelComplete));d.status="ready";d.completedAt=null;d.items.forEach(i=>i.checked=false);d.boxes.forEach(x=>x.checked=false);save();openChecklist(d.id)}return}
      if(b.hasAttribute("data-print"))return window.print();
      if(b.dataset.image)return void saveStatementImage(b.dataset.image);
      if(b.hasAttribute("data-export-excel"))return exportExcel();
      if(b.hasAttribute("data-backup"))return backup();
      if(b.hasAttribute("data-restore"))return $("#restoreInput").click();
    });
    
    document.addEventListener("submit",e=>{
      e.preventDefault();
      if(e.target.id==="customerForm")saveCustomer(e.target);
      if(e.target.id==="deliveryForm")saveDelivery(e.target);
      if(e.target.id==="settingsForm"){
        const fd=Object.fromEntries(new FormData(e.target));
        state.profile={companyName:String(fd.companyName).trim(),driverName:String(fd.driverName).trim(),vehicleNumber:String(fd.vehicleNumber).trim()};
        save();renderSettings();
        startCloudSync(); 
        alert("회사·차량 정보를 저장하고 무선 통신망을 동기화했습니다.");
      }
    });

    document.addEventListener("input", e=>{
      if(e.target.closest("#deliveryForm")) calcLiveTotal();
    });
    
    document.addEventListener("change",e=>{
      if(e.target.id==="workDate"){workDate=e.target.value||dateTomorrowLocal();render()}
      if(e.target.dataset.customerPosition)return moveCustomer(Number(e.target.dataset.customerPosition),Number(e.target.value)-1);
      if(e.target.id==="boxCount"){syncDraft();const d=$("#deliveryDialog")._draft,n=Math.max(0,Math.min(20,Number(e.target.value)||0));d.boxes=Array.from({length:n},(_,i)=>d.boxes[i]||{id:id(),boxNumber:i+1,contents:"",checked:false});d.boxes.forEach((b,i)=>b.boxNumber=i+1);renderBoxEditors()}
      const row=e.target.closest("[data-item-index]");if(row&&(e.target.dataset.item==="category"||e.target.dataset.itemCheck!==undefined)){syncDraft();renderItemEditors()}
      if(e.target.dataset.checkItem)return updateCheck("item",Number(e.target.dataset.checkItem),e.target.checked);
      if(e.target.dataset.checkBox)return updateCheck("box",Number(e.target.dataset.checkBox),e.target.checked);
      if(e.target.id==="restoreInput"&&e.target.files[0])restore(e.target.files[0]);
      
      if(e.target.dataset.tankItem){
        const itemId = Number(e.target.dataset.tankItem);
        const d = state.deliveries.find(x => x.id === selectedDeliveryId);
        if(d) {
          const targetItem = d.items.find(i => i.id === itemId);
          if(targetItem) {
            targetItem.tankNumber = Number(e.target.value);
            save(); render(); openChecklist(selectedDeliveryId);
          }
        }
      }
    });
    
    render();
    startCloudSync(); 
  })();
  </script>
</body>
</html>
