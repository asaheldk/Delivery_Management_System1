  (()=>{

    function renderItemEditor(i,index){return`<article class="item-editor" data-form-item="${index}"><div class="item-editor-head"><strong>${index+1}번 품목</strong><button type="button" data-action="remove-form-item" data-index="${index}" ${formDraft.items.length===1?"disabled":""}>삭제</button></div><div class="three"><label class="field"><span>구분</span><select class="control" data-item-field="category">${categories.map(v=>`<option ${v===i.category?"selected":""}>${v}</option>`).join("")}</select></label><label class="field"><span>어종·품목</span><input class="control" data-item-field="species" value="${esc(i.species)}"></label><label class="field"><span>규격</span><input class="control" data-item-field="size" value="${esc(i.size)}"></label></div><div class="three"><label class="field"><span>원산지</span><input class="control" data-item-field="originCountry" list="originList" value="${esc(i.originCountry)}"></label><label class="field"><span>주문 수량</span><input class="control" data-item-field="requestedQty" type="number" min="0" step=".01" value="${i.requestedQty}"></label><label class="field"><span>주문 단위</span><select class="control" data-item-field="unit">${units.map(v=>`<option ${v===i.unit?"selected":""}>${v}</option>`).join("")}</select></label></div><div class="three"><label class="field"><span>${(i.weighings||[]).length?"계근 자동 합계 kg":"실제 중량 kg"}</span><input class="control" data-item-field="actualWeight" type="number" min="0" step=".001" value="${i.actualWeight??""}" ${(i.weighings||[]).length?"disabled":""}></label><label class="field"><span>판매 단가</span><input class="control" data-item-field="unitPrice" type="number" min="0" value="${i.unitPrice||""}"></label><label class="field"><span>가격 기준</span><select class="control" data-item-field="priceUnit">${units.map(v=>`<option value="${v}" ${v===i.priceUnit?"selected":""}>${v}당</option>`).join("")}</select></label></div><div class="three"><label class="field"><span>수조 위치</span><select class="control" data-item-field="tankNumber"><option value="0">박스·별도</option>${Array.from({length:6},(_,n)=>`<option value="${n+1}" ${Number(i.tankNumber)===n+1?"selected":""}>${n+1}번 수조</option>`).join("")}</select></label><label class="field"><span>작업·보관</span><input class="control" data-item-field="processing" value="${esc(i.processing)}"></label><label class="field"><span>필렛 작업비/kg</span><input class="control" data-item-field="processingFeePerKg" type="number" min="0" value="${i.processingFeePerKg||""}" ${i.category==="필렛 제품"?"":"disabled"}></label></div><label class="band-line"><input data-item-field="rubberBand" type="checkbox" ${i.rubberBand?"checked":""}>꼬리 고무밴드 작업</label><div class="two"><label class="field"><span>밴드 색상</span><input class="control" data-item-field="rubberBandColor" value="${esc(i.rubberBandColor)}" ${i.rubberBand?"":"disabled"}></label><label class="field"><span>밴드 수량</span><input class="control" data-item-field="rubberBandQuantity" type="number" min="0" value="${i.rubberBandQuantity||""}" ${i.rubberBand?"":"disabled"}></label></div><label class="field"><span>품목별 메모</span><input class="control" data-item-field="includedNote" value="${esc(i.includedNote)}"></label></article>`}
    function renderBoxEditor(b,index){return`<div class="box-row" data-form-box="${index}"><span class="box-number">${index+1}</span><input class="control" data-box-field="contents" value="${esc(b.contents)}" placeholder="박스 동봉 내역"><button type="button" data-action="remove-form-box" data-index="${index}">삭제</button></div>`}
    function syncFormDraft(){const form=$("#deliveryForm");if(!form)return;form.querySelectorAll("[data-form-item]").forEach(card=>{const item=formDraft.items[Number(card.dataset.formItem)];card.querySelectorAll("[data-item-field]").forEach(el=>{const key=el.dataset.itemField;item[key]=el.type==="checkbox"?el.checked:el.value})});form.querySelectorAll("[data-form-box]").forEach(row=>{const box=formDraft.boxes[Number(row.dataset.formBox)];box.contents=row.querySelector("[data-box-field]").value});const fd=Object.fromEntries(new FormData(form));Object.assign(formDraft,{customerId:Number(fd.customerId),deliveryDate:fd.deliveryDate,routeOrder:Math.max(1,Number(fd.routeOrder)||1),coPackNote:String(fd.coPackNote||""),notes:String(fd.notes||""),previousBalance:Math.max(0,Number(fd.previousBalance)||0)})}
    function normalizeFormDraft(){formDraft.items=formDraft.items.map(normalizeItem);formDraft.boxes=formDraft.boxes.map(normalizeBox)}
    function saveDelivery(){syncFormDraft();normalizeFormDraft();const desired=formDraft.routeOrder;if(deliveryEditId){const idx=state.deliveries.findIndex(d=>d.id===deliveryEditId);formDraft.id=deliveryEditId;state.deliveries[idx]=formDraft}else{formDraft.id=newId();formDraft.status="ready";formDraft.createdAt=new Date().toISOString();state.deliveries.push(formDraft)}workDate=formDraft.deliveryDate;const target=formDraft,list=state.deliveries.filter(d=>d.deliveryDate===workDate&&d.status!=="cancelled"&&d.id!==target.id).sort(byOrder);list.splice(Math.max(0,Math.min(list.length,desired-1)),0,target);list.forEach((d,i)=>d.routeOrder=i+1);saveState();closeModal("formModal");render()}

    function openWeighingList(){weighDeliveryId=null;weighItemId=null;const ws=weighingStats(),rows=ws.rows.map(({d,i,c})=>{const count=(i.weighings||[]).length,target=targetFishCount(i),total=weightTotal(i);return`<article class="weigh-row ${i.weighingConfirmed?"confirmed":""}"><div><strong>${d.routeOrder}번 ${esc(c.name)} · ${esc(i.species)}</strong><small>${target?`발주 ${target}마리 · `:""}계근 ${count}마리 / ${total.toFixed(3)}kg · ${i.tankNumber?i.tankNumber+"번 수조":"수조 미지정"}</small>${i.weighingConfirmed?`<span class="tag" style="color:#155d32;background:#dff4e6">✓ 계근 확정</span>`:`<span class="tag">계근 필요</span>`}</div><button type="button" data-action="open-weigh-item" data-delivery-id="${d.id}" data-item-id="${i.id}">${i.weighingConfirmed?"확인·수정":"계근 입력"}</button></article>`}).join("");$("#weighModal").innerHTML=`<div class="modal-card"><div class="modal-head"><div><h2>⚖️ ${esc(state.profile.vehicleNumber)}호차 활어 계근</h2><p>한 마리씩 입력하면 거래명세서에 자동 합산됩니다.</p></div><button class="close-button" type="button" data-action="close-weigh">×</button></div><div class="modal-body"><div class="weigh-summary"><div><small>발주 마릿수</small><strong>${ws.target||"-"}</strong></div><div><small>입력 마릿수</small><strong>${ws.entered}</strong></div><div><small>확정 품목</small><strong>${ws.confirmed}/${ws.totalItems}</strong></div></div>${ws.allDone?`<div class="weigh-ready">✓ 호차 계근 완료 · 거래명세서 자동 작성 준비 완료</div>`:`<div class="weigh-notice">발주 거래처와 어종을 확인하고, 저울에서 나온 숫자를 순서대로 입력하세요.</div>`}<div class="weigh-list">${rows||`<div class="empty">오늘 계근할 활어가 없습니다.</div>`}</div><button class="full-button outline-button" type="button" data-action="close-weigh">배송 화면으로 돌아가기</button></div></div>`;$("#weighModal").classList.remove("hidden")}
    function findWeighItem(){const d=state.deliveries.find(x=>x.id===weighDeliveryId),i=d?.items.find(x=>x.id===weighItemId);return{d,i,c:d?customerOf(d):null}}
    function openWeighItem(deliveryId,itemId){weighDeliveryId=Number(deliveryId);weighItemId=Number(itemId);const{d,i,c}=findWeighItem();if(!d||!i)return openWeighingList();const locked=d.status==="completed",count=(i.weighings||[]).length,target=targetFishCount(i),total=weightTotal(i),mismatch=target>0&&count!==target,history=(i.weighings||[]).map((w,index)=>`<div class="weight-history-row" data-weight-row="${w.id}"><span>${index+1}</span><input type="number" inputmode="decimal" min="0.001" step="0.001" value="${w.weight}" data-weight-entry="${w.id}" aria-label="${index+1}번째 활어 중량" ${locked?"disabled":""}><button type="button" data-action="delete-weight" data-id="${w.id}" ${locked?"disabled":""}>삭제</button></div>`).join("");$("#weighModal").innerHTML=`<div class="modal-card"><div class="modal-head"><div><h2>${esc(c.name)} · ${esc(i.species)}</h2><p>${d.routeOrder}번째 배송지 · ${target?`발주 ${target}마리`:`수량 ${i.requestedQty}${esc(i.unit)}`}</p></div><button class="close-button" type="button" data-action="close-weigh">×</button></div><div class="modal-body weight-panel"><div class="weight-focus"><small>현재 계근 합계</small><strong>${total.toFixed(3)}kg</strong><small>${count}마리 입력${target?` / 발주 ${target}마리`:""}</small>${mismatch&&count?`<b>마릿수가 ${count<target?target-count+"마리 부족":count-target+"마리 초과"}합니다.</b>`:""}</div><label class="field"><span>상차할 수조</span><select class="control" data-action="weigh-tank" ${locked?"disabled":""}><option value="0">수조 미지정·박스</option>${Array.from({length:6},(_,n)=>`<option value="${n+1}" ${Number(i.tankNumber)===n+1?"selected":""}>${n+1}번 수조</option>`).join("")}</select></label>${locked?`<div class="weigh-ready">배송 완료된 기록입니다.</div>`:`<form id="weighingForm" class="weight-entry"><input id="weightInput" class="weight-input" name="weight" type="number" inputmode="decimal" min="0.001" max="99.999" step="0.001" placeholder="0.000" aria-label="한 마리 중량 kg" required><button type="submit">저장 후 다음 마리</button></form>`}<div class="heading" style="margin:4px 0 0"><div><h2 style="font-size:18px">개별 계근 내역</h2><p>잘못 입력한 값은 바로 수정하거나 삭제합니다.</p></div>${count&&!locked?`<button class="mini" type="button" data-action="undo-last-weight">마지막 취소</button>`:""}</div><div class="weight-history">${history||`<div class="empty">아직 입력한 중량이 없습니다.</div>`}</div>${locked?"":i.weighingConfirmed?`<button class="full-button warning-button" type="button" data-action="reopen-weighing">계근 확정 취소 · 다시 수정</button>`:`<button class="full-button primary-button" type="button" data-action="confirm-weighing" ${count?"":"disabled"}>${mismatch?"마릿수 확인 후 계근 확정":"계근 완료 · 합계 확정"}</button>`}<button class="full-button outline-button" type="button" data-action="back-weigh-list">계근 목록으로</button></div></div>`;$("#weighModal").classList.remove("hidden");setTimeout(()=>$("#weightInput")?.focus(),60)}
    function addWeight(value){const{d,i}=findWeighItem(),weight=Number(value);if(!d||!i||d.status==="completed"||!Number.isFinite(weight)||weight<=0)return alert("한 마리 중량을 kg 단위로 입력해 주세요.");i.weighings=i.weighings||[];i.weighings.push(normalizeWeighing({weight}));i.weighingConfirmed=false;i.weighingConfirmedAt=null;syncWeightTotal(i);saveState();openWeighItem(d.id,i.id)}
    function editWeight(id,value){const{d,i}=findWeighItem(),entry=i?.weighings?.find(w=>w.id===Number(id)),weight=Number(value);if(!d||!i||!entry||d.status==="completed"||!Number.isFinite(weight)||weight<=0)return;entry.weight=weight;i.weighingConfirmed=false;i.weighingConfirmedAt=null;syncWeightTotal(i);saveState();openWeighItem(d.id,i.id)}
    function deleteWeight(id){const{d,i}=findWeighItem();if(!d||!i||d.status==="completed")return;i.weighings=(i.weighings||[]).filter(w=>w.id!==Number(id));i.weighingConfirmed=false;i.weighingConfirmedAt=null;syncWeightTotal(i);saveState();openWeighItem(d.id,i.id)}
    function confirmWeighing(){const{d,i}=findWeighItem();if(!d||!i||!(i.weighings||[]).length)return;if(!i.tankNumber)return alert("상차한 수조를 1~6번 중에서 먼저 선택해 주세요.");const target=targetFishCount(i),count=i.weighings.length;if(target&&count!==target&&!confirm(`발주는 ${target}마리, 계근 입력은 ${count}마리입니다. 이대로 확정할까요?`))return;i.weighingConfirmed=true;i.weighingConfirmedAt=new Date().toISOString();syncWeightTotal(i);saveState();openWeighingList();renderToday()}

    function openChecklist(id){selectedDeliveryId=id;const d=state.deliveries.find(x=>x.id===id);if(!d)return;const c=customerOf(d),p=progress(d),locked=d.status==="completed",weighReady=deliveryWeighingReady(d);const itemHtml=d.items.map(i=>{const weightCount=(i.weighings||[]).length;return`<article class="check-card ${i.checked?"checked":""}" data-check-item="${i.id}"><div class="check-main"><input type="checkbox" data-check-toggle="item" ${i.checked?"checked":""} ${locked?"disabled":""}><span class="check-copy"><strong>${esc(i.species)} · ${esc(quantityText(i))}</strong><small>${esc(i.size)} / ${esc(i.originCountry)} / ${esc(i.processing)}</small><span class="important-tags"><span class="tag">${i.tankNumber?i.tankNumber+"번 수조":"박스·별도"}</span>${isWeighable(i)?`<span class="tag" style="color:${i.weighingConfirmed?"#155d32":"#7b3f0c"};background:${i.weighingConfirmed?"#dff4e6":"#ffedda"}">계근 ${weightCount}마리 · ${weightTotal(i).toFixed(3)}kg ${i.weighingConfirmed?"확정":"미확정"}</span>`:""}${i.rubberBand?`<span class="tag">밴드 ${esc(i.rubberBandColor)} ${i.rubberBandQuantity}개</span>`:""}${i.includedNote?`<span class="tag memo">${esc(i.includedNote)}</span>`:""}</span></span></div><div class="check-inputs"><label class="field"><span>수조 위치</span><select class="control" data-check-field="tankNumber" ${locked?"disabled":""}><option value="0">박스·별도</option>${Array.from({length:6},(_,n)=>`<option value="${n+1}" ${Number(i.tankNumber)===n+1?"selected":""}>${n+1}번 수조</option>`).join("")}</select></label><label class="field"><span>${weightCount?"계근 합계 kg":"실제 중량 kg"}</span><input class="control" data-check-field="actualWeight" type="number" min="0" step=".001" value="${i.actualWeight??""}" ${locked||weightCount?"disabled":""}></label><label class="field"><span>확정 단가</span><input class="control" data-check-field="unitPrice" type="number" min="0" value="${i.unitPrice||""}" ${locked?"disabled":""}></label></div>${isWeighable(i)&&!locked?`<button class="full-button outline-button" type="button" data-action="open-weigh-item" data-delivery-id="${d.id}" data-item-id="${i.id}">⚖️ 개별 계근 ${weightCount?"확인·수정":"입력"}</button>`:""}</article>`}).join("");

      const amount=d.items.reduce((s,i)=>s+itemAmount(i),0),allChecked=p.total>0&&p.done===p.total,canComplete=allChecked&&weighReady;$("#checkModal").innerHTML=`<div class="modal-card"><div class="modal-head"><div><h2>${esc(c.name)}</h2><p>${d.routeOrder}번째 배송지 · ${p.done}/${p.total} 확인</p></div><button class="close-button" type="button" data-action="close-check">×</button></div><div class="modal-body"><div class="heading"><div><h2 style="font-size:19px">어종·수조·요구사항</h2><p>실물과 대조한 뒤 체크하세요.</p></div></div>${itemHtml||`<div class="empty">품목이 없습니다.</div>`}<div class="heading" style="margin-top:8px"><div><h2 style="font-size:19px">박스·동봉품</h2><p>${esc(d.coPackNote||"동봉품 전체 메모 없음")}</p></div>${locked?"":`<button class="mini" type="button" data-action="add-check-box">＋ 박스</button>`}</div>${boxes||`<div class="empty">등록된 박스가 없습니다.</div>`}${weighReady?"":`<div class="weigh-notice no-print">활어 계근을 모두 확정해야 거래명세서를 출력하고 하차 완료할 수 있습니다.</div>`}<div id="statementView" class="statement">${statementHTML(d,c,amount)}</div><div class="output-grid no-print"><button type="button" data-action="print-statement" ${weighReady?"":"disabled"}>🖨️ 인쇄</button><button type="button" data-action="image-statement" data-format="png" ${weighReady?"":"disabled"}>PNG 저장</button><button type="button" data-action="image-statement" data-format="jpg" ${weighReady?"":"disabled"}>JPG 저장</button></div>${locked?"":`<button class="full-button outline-button no-print" type="button" data-action="edit-delivery" data-id="${d.id}">발주·포장 내용 수정</button>`}${locked?`<button class="full-button warning-button no-print" type="button" data-action="undo-complete" data-id="${d.id}">하차 완료 취소 · 다시 확인</button>`:`<button class="full-button primary-button no-print" type="button" data-action="complete-delivery" data-id="${d.id}" ${canComplete?"":"disabled"}>${!weighReady?"활어 계근을 먼저 확정해 주세요":allChecked?"모두 확인 · 하차 완료":"어종과 박스를 모두 확인해 주세요"}</button>`}</div></div>`;$("#checkModal").classList.remove("hidden")}

    async function pollCloud(){const code=String(state.profile.vehicleNumber||"").trim().replace(/[^a-zA-Z0-9_-]/g,"");if(!code){$("#networkDot").className="dot loading";$("#networkText").textContent="호차 설정 필요";return}$("#networkDot").className="dot loading";$("#networkText").textContent="발주 확인 중...";try{const res=await fetch(`${CLOUD_RELAY_URL}${code}/json?poll=1`);if(!res.ok)throw new Error();const text=await res.text();$("#networkDot").className="dot";$("#networkText").textContent="발주 자동 수신중";if(!text.trim())return;const events=text.trim().split("\n").map(line=>{try{const raw=JSON.parse(line);const packet=JSON.parse(raw.message||"{}");return{packet,time:Number(packet.serverTimestamp)||Number(raw.time)||0}}catch{return null}}).filter(Boolean).sort((a,b)=>a.time-b.time),acked=readJSON(ACK_KEY,[]),cancelledIds=new Set(events.filter(e=>e.packet.status==="cancelled").map(e=>e.packet.orderId));let changed=false,newArrived=false;for(const{packet}of events){if(!packet.orderId||acked.includes(packet.orderId))continue;const existing=state.deliveries.find(d=>d.cloudOrderId===packet.orderId);if(packet.status==="ordered"){if(existing||cancelledIds.has(packet.orderId))continue;const store=String(packet.store||"").trim();if(!store||!Array.isArray(packet.items))continue;let customer=state.customers.find(c=>c.name===store);if(!customer){customer={id:newId(),name:store,deliveryPlace:store,address:packet.address||"",phone:packet.phone||"",routeOrder:customers().length+1};state.customers.push(customer)}else{if(packet.address)customer.address=packet.address;if(packet.phone)customer.phone=packet.phone}const items=packet.items.map(pi=>normalizeItem({category:pi.category,species:pi.item,size:pi.size,originCountry:pi.origin,requestedQty:pi.qty,unit:pi.unit,processing:pi.process,includedNote:pi.memo,rubberBand:pi.rubberBand,rubberBandColor:pi.rubberBandColor,rubberBandQuantity:pi.rubberBandQuantity}));const boxes=[];items.filter(i=>i.unit==="박스").forEach(i=>{const count=Math.max(1,Math.min(20,Math.floor(Number(i.requestedQty)||1)));for(let n=0;n<count;n++)boxes.push(normalizeBox({contents:`${i.species} ${n+1}/${count}박스`},boxes.length))});state.deliveries.push(normalizeDelivery({id:newId(),cloudOrderId:packet.orderId,customerId:customer.id,fallbackStoreName:store,deliveryDate:packet.orderDate||localDate(1),routeOrder:deliveries(packet.orderDate||localDate(1)).filter(d=>d.status!=="cancelled").length+1,status:"new",items,boxes,notes:"",coPackNote:"",previousBalance:0,createdAt:new Date().toISOString()}));changed=true;newArrived=true}else if(packet.status==="cancelled"&&existing&&existing.status!=="cancelled"){existing.status="cancelled";changed=true;triggerCancel(packet.store||customerOf(existing).name)}}if(changed){saveState();render();if(newArrived)triggerAlarm()}}catch{$("#networkDot").className="dot loading";$("#networkText").textContent=navigator.onLine?"발주 연결 재시도 중":"인터넷 끊김"}}

      if(action==="close-modal")return closeModal("formModal");if(action==="close-check")return closeModal("checkModal");if(action==="close-purchase")return closeModal("purchaseModal");if(action==="close-image")return closeModal("imageModal");
      if(action==="add-form-item"){syncFormDraft();formDraft.items.push(blankItem());return renderDeliveryForm()}if(action==="remove-form-item"){syncFormDraft();if(formDraft.items.length>1)formDraft.items.splice(Number(b.dataset.index),1);return renderDeliveryForm()}if(action==="add-form-box"){syncFormDraft();formDraft.boxes.push(normalizeBox({contents:""},formDraft.boxes.length));return renderDeliveryForm()}if(action==="remove-form-box"){syncFormDraft();formDraft.boxes.splice(Number(b.dataset.index),1);formDraft.boxes=formDraft.boxes.map(normalizeBox);return renderDeliveryForm()}
      if(action==="edit-delivery"){closeModal("checkModal");return openDelivery(Number(b.dataset.id))}if(action==="add-check-box"){const d=state.deliveries.find(x=>x.id===selectedDeliveryId);d.boxes.push(normalizeBox({contents:""},d.boxes.length));saveState();return openChecklist(d.id)}if(action==="delete-check-box"){const d=state.deliveries.find(x=>x.id===selectedDeliveryId);d.boxes=d.boxes.filter(x=>x.id!==Number(b.dataset.id)).map(normalizeBox);saveState();return openChecklist(d.id)}
      if(action==="complete-delivery"){const d=state.deliveries.find(x=>x.id===Number(b.dataset.id));if(!deliveryWeighingReady(d))return alert("활어 계근을 먼저 확정해 주세요.");d.status="completed";d.completedAt=new Date().toISOString();saveState();closeModal("checkModal");return render()}if(action==="undo-complete"){if(confirm("하차 완료를 취소하고 다시 확인할까요?")){const d=state.deliveries.find(x=>x.id===Number(b.dataset.id));d.status="ready";d.completedAt=null;saveState();openChecklist(d.id)}return}
      if(action==="print-statement")return printElement($("#statementView").outerHTML);if(action==="image-statement")return saveImage($("#statementView"),b.dataset.format,`${customerOf(state.deliveries.find(d=>d.id===selectedDeliveryId)).name}_거래명세서_${workDate}`);if(action==="open-purchase")return openPurchase();if(action==="print-purchase")return printElement($("#purchaseSheet").outerHTML);if(action==="image-purchase")return saveImage($("#purchaseSheet"),b.dataset.format,`당일_매입발주서_${workDate}`);if(action==="export-excel")return exportExcel();if(action==="backup")return backup();if(action==="restore")return $("#restoreInput").click();
      if(action==="delete-customer"){const id=Number(b.dataset.id);if(state.deliveries.some(d=>d.customerId===id))return alert("이 거래처의 배송 기록이 있어 삭제할 수 없습니다.");if(confirm("거래처를 삭제할까요?")){state.customers=state.customers.filter(c=>c.id!==id);normalizeCustomerOrder();saveState();closeModal("formModal");renderCustomers()}}
    });
    document.addEventListener("submit",e=>{e.preventDefault();if(e.target.id==="setupForm"||e.target.id==="settingsForm"){const fd=Object.fromEntries(new FormData(e.target));state.profile={companyName:String(fd.companyName).trim(),driverName:String(fd.driverName).trim(),vehicleNumber:String(fd.vehicleNumber).trim()};saveState();closeModal("setupModal");render();startCloudSync();if(e.target.id==="settingsForm")alert("회사·차량 정보를 저장했습니다.")}if(e.target.id==="customerForm")saveCustomer(e.target);if(e.target.id==="deliveryForm")saveDelivery();if(e.target.id==="weighingForm")addWeight(new FormData(e.target).get("weight"))});
    document.addEventListener("change",e=>{if(e.target.id==="workDate"){workDate=e.target.value||localDate(1);reorderMode=false;render()}if(e.target.dataset.action==="route-position")moveDelivery(Number(e.target.dataset.id),Number(e.target.value)-1);if(e.target.dataset.action==="weigh-tank"){const{d,i}=findWeighItem();if(d&&i&&d.status!=="completed"){i.tankNumber=Number(e.target.value)||0;saveState();renderToday()}}if(e.target.dataset.weightEntry)editWeight(e.target.dataset.weightEntry,e.target.value);if(e.target.dataset.checkToggle){const card=e.target.closest(e.target.dataset.checkToggle==="item"?"[data-check-item]":"[data-check-box]");if(e.target.dataset.checkToggle==="item")updateCheckItem(Number(card.dataset.checkItem),"checked",e.target.checked);else updateCheckBox(Number(card.dataset.checkBox),"checked",e.target.checked);openChecklist(selectedDeliveryId)}if(e.target.dataset.checkField){const card=e.target.closest("[data-check-item]");updateCheckItem(Number(card.dataset.checkItem),e.target.dataset.checkField,e.target.value);renderToday();openChecklist(selectedDeliveryId)}if(e.target.id==="restoreInput"&&e.target.files[0])restore(e.target.files[0]);if(e.target.dataset.itemField==="category"){syncFormDraft();normalizeFormDraft();renderDeliveryForm()}if(e.target.dataset.itemField==="rubberBand"){syncFormDraft();normalizeFormDraft();renderDeliveryForm()}});
    document.addEventListener("input",e=>{if(e.target.dataset.checkField){const card=e.target.closest("[data-check-item]");updateCheckItem(Number(card.dataset.checkItem),e.target.dataset.checkField,e.target.value);refreshStatement()}if(e.target.hasAttribute("data-check-box-content")){const card=e.target.closest("[data-check-box]");updateCheckBox(Number(card.dataset.checkBox),"contents",e.target.value)}if(e.target.closest("#deliveryForm")){syncFormDraft();normalizeFormDraft();const total=formDraft.items.reduce((s,i)=>s+itemAmount(i),0)+Number(formDraft.previousBalance||0);if($("#formTotal"))$("#formTotal").textContent=money(total)+"원"}});
    render();startCloudSync();if(!state.profile.companyName||!state.profile.driverName||!state.profile.vehicleNumber)openSetup();
  })();
  </script>
</body>
</html>
