<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#123c5a">
  <title>배송 관리</title>
  <script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root{--navy:#123c5a;--teal:#0f8b82;--teal-dark:#086e68;--ink:#182833;--muted:#687985;--line:#dce5e9;--bg:#edf3f5;--warn:#d96c27;--danger:#b7453d;--white:#fff;--shadow:0 12px 35px rgba(23,54,72,.13)}
    *{box-sizing:border-box}html{background:var(--bg)}body{margin:0;color:var(--ink);background:var(--bg);font-family:Pretendard,"Noto Sans KR",Arial,sans-serif;-webkit-tap-highlight-color:transparent}button,input,select,textarea{font:inherit}button{cursor:pointer}button:disabled{cursor:not-allowed;opacity:.55}.app{width:min(100%,760px);min-height:100dvh;margin:auto;padding:0 0 92px;background:#f8fbfc;box-shadow:var(--shadow)}
    .top{position:sticky;top:0;z-index:10;padding:16px 18px;color:#fff;background:linear-gradient(135deg,var(--navy),#195d78)}.topline{display:flex;align-items:center;justify-content:space-between;gap:12px}.top h1{margin:3px 0 0;font-size:22px}.top p{margin:5px 0 0;color:#d5e7ee;font-size:12px}.top button{min-width:54px;min-height:40px;border:1px solid rgba(255,255,255,.35);border-radius:12px;color:#fff;background:rgba(255,255,255,.1);font-weight:800}.datebar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px;padding-top:13px;border-top:1px solid rgba(255,255,255,.18)}.datebar input{min-height:38px;padding:0 8px;border:0;border-radius:10px;color:var(--navy);background:#fff;font-weight:800}.autosave{font-size:12px;font-weight:800}
    main{padding:17px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{padding:13px 9px;border:1px solid var(--line);border-radius:15px;background:#fff;text-align:center}.stat small{display:block;color:var(--muted);font-size:11px}.stat strong{display:block;margin-top:5px;color:var(--navy);font-size:24px}.section{margin-top:20px}.heading{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:10px}.heading h2{margin:0;font-size:18px}.heading p{margin:4px 0 0;color:var(--muted);font-size:11px}.heading-actions{display:flex;gap:6px}.mini,.small-primary{min-height:38px;padding:0 11px;border-radius:10px;font-size:12px;font-weight:900}.mini{border:1px solid #c6d4db;color:var(--navy);background:#fff}.small-primary{border:0;color:#fff;background:var(--teal)}
    .excel{width:100%;min-height:50px;margin-top:10px;border:0;border-radius:14px;color:#fff;background:var(--teal);font-weight:900}.tank-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.tank{min-height:90px;padding:11px;border:1px solid #c8dce5;border-radius:14px;background:#eef8fb}.tank strong{display:block;color:var(--navy)}.tank p{margin:5px 0 0;color:#3d5d6d;font-size:11px;line-height:1.45}.empty{padding:26px 15px;border:1px dashed #bfced5;border-radius:16px;color:var(--muted);background:#fff;text-align:center;font-size:13px}.stop-list,.customer-list{display:grid;gap:9px}.stop,.customer-row{display:flex;align-items:center;gap:11px;width:100%;padding:12px;border:1px solid var(--line);border-radius:16px;background:#fff;text-align:left}.order{display:grid;place-items:center;flex:0 0 37px;height:37px;border-radius:11px;color:#fff;background:var(--navy);font-weight:900}.stop-copy,.customer-copy{min-width:0;flex:1}.stop-copy strong,.customer-copy strong{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.stop-copy small,.customer-copy small{display:block;margin-top:4px;color:var(--muted);font-size:11px}.progress{flex:0 0 43px;color:var(--teal-dark);font-size:12px;font-weight:900;text-align:right}.completed{border-color:#a6d9d3;background:#effaf8}.completed .order{background:var(--teal)}.customer-row>button{min-height:36px;padding:0 10px;border:1px solid var(--line);border-radius:9px;color:var(--navy);background:#fff;font-size:12px;font-weight:900}.reorder{display:flex;gap:4px}.reorder select,.reorder button{height:36px;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:12px}.reorder button{width:36px;font-weight:900}
    .settings-card{display:grid;gap:12px;padding:15px;border:1px solid var(--line);border-radius:17px;background:#fff}.field{display:grid;gap:6px}.field>span{font-size:12px;font-weight:900}.field input,.field select,.field textarea{width:100%;min-height:48px;padding:10px 12px;border:1px solid #cbd8de;border-radius:12px;color:var(--ink);background:#fff}.field textarea{min-height:82px;resize:vertical}.two{display:grid;grid-template-columns:1fr 1fr;gap:9px}.primary,.outline,.danger,.warning{width:100%;min-height:52px;border-radius:14px;font-weight:900}.primary{border:0;color:#fff;background:var(--teal)}.outline{border:1px solid #bdccd4;color:var(--navy);background:#fff}.danger{border:1px solid #e0aca8;color:#a33d36;background:#fff3f2}.warning{border:1px solid #efbd99;color:#98460f;background:#fff4eb}.backup-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.notice{padding:11px 12px;border-radius:12px;color:#176d78;background:#eaf8f5;font-size:12px;line-height:1.5}
    nav{position:fixed;right:0;bottom:0;left:0;z-index:20;display:grid;grid-template-columns:repeat(3,1fr);width:min(100%,760px);height:72px;margin:auto;padding-bottom:env(safe-area-inset-bottom);border-top:1px solid var(--line);background:#fff}nav button{border:0;color:#7b8a93;background:#fff;font-size:12px;font-weight:900}nav button span{display:block;margin-bottom:4px;font-size:20px}nav button.active{color:var(--teal)}
    dialog{width:min(calc(100% - 20px),700px);max-height:92dvh;padding:0;border:0;border-radius:22px;background:#fff;box-shadow:0 20px 70px rgba(8,37,53,.27)}dialog::backdrop{background:rgba(6,24,35,.54)}.modal-head{position:sticky;top:0;z-index:3;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 17px;border-bottom:1px solid var(--line);background:#fff}.modal-head h2{margin:0;font-size:20px}.modal-head p{margin:5px 0 0;color:var(--muted);font-size:11px}.close{flex:0 0 39px;height:39px;border:0;border-radius:50%;color:var(--navy);background:#edf3f5;font-size:22px}.modal-body{display:grid;gap:13px;padding:16px}.sticky-save{position:sticky;bottom:0;z-index:2;box-shadow:0 -8px 20px rgba(255,255,255,.95)}
    .subhead{display:flex;align-items:flex-end;justify-content:space-between;margin-top:5px}.subhead strong{font-size:16px}.subhead small{color:var(--muted);font-size:11px}.item-editor{display:grid;gap:10px;padding:13px;border:1px solid var(--line);border-radius:16px;background:#f8fbfc}.item-title{display:flex;align-items:center;justify-content:space-between}.item-title button{border:0;color:var(--danger);background:transparent;font-size:12px;font-weight:900}.three{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:8px}.check-inline{display:flex;align-items:center;gap:8px;padding:11px;border:1px solid #eac89c;border-radius:12px;background:#fff9f1;font-size:12px;font-weight:900}.check-inline input{width:20px;height:20px}.box-editor{display:grid;gap:8px}.box-row{display:grid;grid-template-columns:35px 1fr;align-items:center;gap:8px}.box-row b{display:grid;place-items:center;height:35px;border-radius:10px;color:#fff;background:var(--navy)}.box-row input{min-height:45px;padding:8px 10px;border:1px solid var(--line);border-radius:11px}
    .alert{padding:13px;border:1px solid #efb181;border-radius:14px;color:#91440e;background:#fff2e8;font-size:12px;line-height:1.5}.check-list{display:grid;gap:8px}.check-row{display:flex;align-items:center;gap:11px;min-height:69px;padding:11px;border:1px solid var(--line);border-radius:15px;background:#fff}.check-row.checked{border-color:#9fd7d0;background:#effaf8}.check-row input{width:25px;height:25px;accent-color:var(--teal)}.check-copy{flex:1}.check-copy strong,.check-copy small{display:block}.check-copy small{margin-top:4px;color:var(--muted);font-size:11px;line-height:1.45}.tag{display:inline-block;margin-top:5px;padding:4px 7px;border-radius:7px;color:#9b5014;background:#fff0dc;font-size:10px;font-weight:900}.statement{padding:18px;border:1px solid var(--line);border-radius:16px;background:#fff}.statement h1{margin:0;color:var(--navy);font-size:24px}.statement-meta{display:grid;grid-template-columns:1fr 1fr;gap:5px 18px;margin:13px 0 17px;padding:12px 0;border-top:2px solid var(--navy);border-bottom:1px solid var(--line)}.statement-meta p{display:grid;grid-template-columns:62px 1fr;gap:7px;margin:0;font-size:12px}.statement-meta p.address{grid-column:1/-1}.statement-meta span{color:var(--muted)}.statement-meta b{overflow-wrap:anywhere}.line{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin:10px 0;padding-top:9px;border-top:1px dashed var(--line);font-size:12px}.line b{white-space:nowrap}.subtotal,.balance,.total{display:flex;justify-content:space-between;gap:10px;margin:9px 0;font-weight:900}.subtotal{padding-top:11px;border-top:1px dashed var(--line)}.balance{color:#ac581b}.total{padding-top:11px;border-top:2px solid var(--navy);color:var(--navy);font-size:16px}.statement-note{padding-top:10px;border-top:1px dashed var(--line);color:var(--muted);font-size:11px;white-space:pre-wrap}.output-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}.output-actions button{min-height:45px;border:1px solid #b8d7d3;border-radius:11px;color:var(--teal-dark);background:#eff9f7;font-size:12px;font-weight:900}.hidden{display:none!important}
    @media(max-width:440px){.tank-grid{grid-template-columns:repeat(2,1fr)}.two,.three{grid-template-columns:1fr}.statement-meta{grid-template-columns:1fr}.statement-meta p.address{grid-column:auto}}
    @media print{@page{size:auto;margin:0}body{background:#fff}body *{visibility:hidden!important}#statementPrint,#statementPrint *{visibility:visible!important}#statementPrint{position:fixed;inset:0;width:100%;padding:12mm;border:0;border-radius:0;box-shadow:none}.output-actions,.modal-head,.no-print{display:none!important}}
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="topline"><div><h1 id="headerCompany">회사명 입력</h1><p id="headerDriver">차량 호차 미입력 · 배송담당자 미입력</p></div><button type="button" data-nav="settings">설정</button></div>
      <div class="datebar"><input id="workDate" type="date" aria-label="업무 날짜"><span class="autosave">● 자동 저장</span></div>
    </header>
    <main>
      <section id="todayView"></section>
      <section id="customersView" class="hidden"></section>
      <section id="settingsView" class="hidden"></section>
    </main>
    <nav aria-label="주요 메뉴">
      <button type="button" class="active" data-nav="today"><span>✓</span>배송</button>
      <button type="button" data-nav="customers"><span>▤</span>거래처</button>
      <button type="button" data-nav="settings"><span>⚙</span>설정</button>
    </nav>
  </div>

  <dialog id="customerDialog"></dialog>
  <dialog id="deliveryDialog"></dialog>
  <dialog id="checklistDialog"></dialog>
  <input id="restoreInput" class="hidden" type="file" accept="application/json,.json">

  <div id="mobileImagePopup" class="hidden" style="position:fixed;inset:0;background:rgba(18,60,90,0.95);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;">
    <div style="background:#fff;padding:22px;border-radius:20px;width:100%;max-width:400px;box-shadow:0 12px 35px rgba(0,0,0,0.3);">
      <h3 style="margin-top:0;color:var(--navy);font-size:20px;font-weight:900;">📸 거래명세서 저장</h3>
      <p style="font-size:14px;color:var(--muted);margin-bottom:18px;line-height:1.5;font-weight:700;">아래 초록색 버튼을 눌러 바로 다운로드하시거나,<br>명세서를 <span style="color:var(--danger);font-weight:900;text-decoration:underline;">2초간 꾹 눌러서</span> 저장해주세요!</p>
      <div style="border:2px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:18px;max-height:45vh;overflow-y:auto;background:#fff;">
        <img id="popupImg" src="" style="width:100%;height:auto;display:block;">
      </div>
      <button type="button" onclick="window.downloadDirectToGallery()" style="width:100%;min-height:56px;background:#0f8b82;color:#fff;border:0;border-radius:14px;font-weight:900;font-size:17px;margin-bottom:10px;box-shadow:0 4px 12px rgba(15,139,130,0.3);">📥 사진첩에 바로 다운로드</button>
      <button type="button" onclick="document.getElementById('mobileImagePopup').classList.add('hidden')" style="width:100%;min-height:52px;background:var(--navy);color:#fff;border:0;border-radius:14px;font-weight:900;font-size:16px;">닫기 (관제탑 복귀)</button>
    </div>
  </div>

  <script>
  (()=>{
    "use strict";
    const STORAGE_KEY="jangbaek_delivery_html_v1";
    const categories=["활어","패류","냉동제품","필렛 제품"];
    const species=["광어","도미","농어","점성어","연어","우니(성게알)","전복","백상합","멍게","개불","소라","해삼","가리비","기타"];
    const origins=["대한민국","일본","중국","러시아","노르웨이","칠레","캐나다","미국","호주","뉴질랜드","베트남","태국","인도네시아","필리핀","대만","페루","멕시코","기타"];
    const $=s=>document.querySelector(s);
    const money=n=>new Intl.NumberFormat("ko-KR").format(Math.round(Number(n)||0));
    const id=()=>Date.now()+Math.floor(Math.random()*100000);
    const dateLocal=()=>{const d=new Date(),o=d.getTimezoneOffset()*60000;return new Date(d-o).toISOString().slice(0,10)};
    const esc=v=>String(v??"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));
    const safeName=v=>String(v||"배송").replace(/[\\/:*?"<>|]/g,"_");
    let state=load();
    let view="today";
    let workDate=dateLocal();
    let customerEditId=null;
    let deliveryEditId=null;
    let selectedDeliveryId=null;
    let customerReorder=false;

    function emptyState(){return{profile:{companyName:"",driverName:"",vehicleNumber:""},customers:[],deliveries:[]}}
    function load(){try{const data=JSON.parse(localStorage.getItem(STORAGE_KEY)||"null");return data&&data.profile&&Array.isArray(data.customers)&&Array.isArray(data.deliveries)?data:emptyState()}catch{return emptyState()}}
    function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));renderHeader()}
    function byOrder(a,b){return(Number(a.routeOrder)||999)-(Number(b.routeOrder)||999)||a.id-b.id}
    function customers(){return[...state.customers].sort(byOrder)}
    function deliveries(){return state.deliveries.filter(d=>d.deliveryDate===workDate).sort(byOrder)}
    function customerOf(d){return state.customers.find(c=>c.id===d.customerId)||{name:"삭제된 거래처",deliveryPlace:"",address:"",phone:""}}
    function itemQty(i){return i.category==="냉동제품"?`${i.requestedQty||0}팩`:i.actualWeight?`${i.actualWeight}kg`:`${i.requestedQty||0}${i.unit||"마리"}`}
    
    // 🚨 [1번 패치]: 실제 중량 미입력 시 '주문 수량(requestedQty)'으로 영리하게 대체하여 무조건 계산되도록 수리
    function baseAmount(i){
      if(i.category==="냉동제품")return(Number(i.requestedQty)||0)*(Number(i.unitPrice)||0);
      const w=i.actualWeight?Number(i.actualWeight):Number(i.requestedQty);
      return(w||0)*(Number(i.unitPrice)||0);
    }
    function itemAmount(i){
      const w=i.actualWeight?Number(i.actualWeight):Number(i.requestedQty);
      return baseAmount(i)+(i.category==="필렛 제품"?(w||0)*(Number(i.processingFeePerKg)||0):0);
    }

    // 🚨 실시간 단가 합계 계산 연동 스크립트
    function calcLiveTotal() {
        if(!$("#deliveryDialog").open) return;
        syncDraft();
        const d = $("#deliveryDialog")._draft;
        const fd = Object.fromEntries(new FormData($("#deliveryForm")));
        const prev = Math.max(0, Number(fd.previousBalance)||0);
        let sum = 0;
        d.items.forEach(i => sum += itemAmount(i));
        const totalEl = document.getElementById("liveTotalWon");
        if(totalEl) totalEl.innerText = money(sum + prev) + "원";
    }

    function progress(d){const all=[...(d.items||[]),...(d.boxes||[])],done=all.filter(x=>x.checked).length;return{done,total:all.length}}

    function renderHeader(){
      $("#headerCompany").textContent=state.profile.companyName||"회사명 입력";
      $("#headerDriver").textContent=`${state.profile.vehicleNumber||"차량 호차 미입력"} · ${state.profile.driverName||"배송담당자 미입력"}`;
      $("#workDate").value=workDate;
    }
    function setView(next){view=next;document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("active",b.dataset.nav===view));$("#todayView").classList.toggle("hidden",view!=="today");$("#customersView").classList.toggle("hidden",view!=="customers");$("#settingsView").classList.toggle("hidden",view!=="settings");render()}
    function render(){renderHeader();if(view==="today")renderToday();if(view==="customers")renderCustomers();if(view==="settings")renderSettings()}

    function renderToday(){
      const rows=deliveries(),ready=rows.filter(d=>d.status!=="completed").length,complete=rows.filter(d=>d.status==="completed").length,boxes=rows.reduce((s,d)=>s+(d.boxes||[]).length,0);
      const tanks=Array.from({length:6},(_,x)=>{const n=x+1,loads=rows.flatMap(d=>(d.items||[]).filter(i=>Number(i.tankNumber)===n).map(i=>`${customerOf(d).name} · ${i.species} ${itemQty(i)}`));return`<div class="tank"><strong>${n}번 수조</strong><p>${loads.length?loads.map(esc).join("<br>"):"비어 있음"}</p></div>`}).join("");
      const stops=rows.length?rows.map(d=>{const c=customerOf(d),p=progress(d),names=(d.items||[]).map(i=>i.species).slice(0,3).join(" · ");return`<button type="button" class="stop ${d.status==="completed"?"completed":""}" data-open-check="${d.id}"><span class="order">${d.routeOrder}</span><span class="stop-copy"><strong>${esc(c.name)}</strong><small>${esc(names||"품목 없음")}${(d.boxes||[]).length?` · ${d.boxes.length}박스`:""}</small></span><span class="progress">${p.done}/${p.total}</span></button>`}).join(""):`<div class="empty">오늘 등록된 배송이 없습니다.<br>거래처 등록 후 발주를 추가해 주세요.</div>`;
      $("#todayView").innerHTML=`<div class="stats"><div class="stat"><small>출차 준비</small><strong>${ready}</strong></div><div class="stat"><small>배송 완료</small><strong>${complete}</strong></div><div class="stat"><small>전체 박스</small><strong>${boxes}</strong></div></div><button class="excel" type="button" data-export-excel ${rows.length?"":"disabled"}>↓ 당일 전체 거래명세표 Excel 저장</button><div class="section"><div class="heading"><div><h2>1톤 차량 수조 현황</h2><p>상차한 어종·패류의 수조 위치입니다.</p></div></div><div class="tank-grid">${tanks}</div></div><div class="section"><div class="heading"><div><h2>배송 순서</h2><p>포장 내용과 하차 물품을 확인하세요.</p></div><div class="heading-actions"><button type="button" class="small-primary" data-new-delivery ${state.customers.length?"":"disabled"}>＋ 발주</button></div></div><div class="stop-list">${stops}</div></div>`;
    }

    function renderCustomers(){
      const list=customers();

    function itemEditor(i,x){return`<div class="item-editor" data-item-index="${x}"><div class="item-title"><strong>${x+1}번 품목</strong><button type="button" data-remove-item="${x}">삭제</button></div><div class="three"><label class="field"><span>구분</span><select data-item="category">${categories.map(v=>`<option ${i.category===v?"selected":""}>${v}</option>`).join("")}</select></label><label class="field"><span>어종·품목</span><input data-item="species" list="speciesList" value="${esc(i.species)}"></label><label class="field"><span>원산지</span><input data-item="originCountry" list="originList" value="${esc(i.originCountry)}" placeholder="선택·직접입력"></label></div><div class="three"><label class="field"><span>주문 수량</span><input data-item="requestedQty" type="number" min="0" step="0.01" value="${i.requestedQty}"></label><label class="field"><span>단위</span><select data-item="unit"><option ${i.unit==="마리"?"selected":""}>마리</option><option ${i.unit==="팩"?"selected":""}>팩</option><option ${i.unit==="박스"?"selected":""}>박스</option><option ${i.unit==="개"?"selected":""}>개</option></select></label><label class="field"><span>실제 중량(kg)</span><input data-item="actualWeight" type="number" min="0" step="0.01" value="${i.actualWeight??""}" ${i.category==="냉동제품"?"disabled":""}></label></div><div class="three"><label class="field"><span>${i.category==="냉동제품"?"팩당 가격":"kg당 단가"}</span><input data-item="unitPrice" type="number" min="0" value="${i.unitPrice||""}"></label><label class="field"><span>필렛 작업비/kg</span><input data-item="processingFeePerKg" type="number" min="0" value="${i.processingFeePerKg||""}" ${i.category==="필렛 제품"?"":"disabled"}></label><label class="field"><span>수조 위치</span><select data-item="tankNumber"><option value="0">박스·별도</option>${Array.from({length:6},(_,n)=>`<option value="${n+1}" ${Number(i.tankNumber)===n+1?"selected":""}>${n+1}번 수조</option>`).join("")}</select></label></div><label class="field"><span>작업·보관</span><input data-item="processing" value="${esc(i.processing)}" placeholder="예: 찍어바리, 냉동 보관"></label><label class="check-inline"><input data-item-check="rubberBand" type="checkbox" ${i.rubberBand?"checked":""}>꼬리 고무밴드 작업</label><div class="two"><label class="field"><span>고무밴드 수량</span><input data-item="rubberBandQuantity" type="number" min="0" value="${i.rubberBandQuantity||""}" ${i.rubberBand?"":"disabled"}></label><label class="field"><span>고무밴드 색상</span><input data-item="rubberBandColor" value="${esc(i.rubberBandColor)}" ${i.rubberBand?"":"disabled"} placeholder="예: 빨강"></label></div><label class="field"><span>품목·동봉 메모</span><input data-item="includedNote" value="${esc(i.includedNote)}"></label></div>`}
    function renderItemEditors(){const d=$("#deliveryDialog")._draft;$("#itemEditors").innerHTML=d.items.map(itemEditor).join("")+`<datalist id="speciesList">${species.map(v=>`<option value="${v}">`).join("")}</datalist><datalist id="originList">${origins.map(v=>`<option value="${v}">`).join("")}</datalist>`}

    function syncDraft(){const dlg=$("#deliveryDialog"),d=dlg._draft;dlg.querySelectorAll("[data-item-index]").forEach(row=>{const i=d.items[Number(row.dataset.itemIndex)];row.querySelectorAll("[data-item]").forEach(el=>{i[el.dataset.item]=el.value});const ch=row.querySelector("[data-item-check]");i.rubberBand=ch.checked});dlg.querySelectorAll("[data-box]").forEach(el=>{d.boxes[Number(el.dataset.box)].contents=el.value})}
    function saveDelivery(form){syncDraft();const fd=Object.fromEntries(new FormData(form)),d=$("#deliveryDialog")._draft;if(!d.items.length)return alert("품목을 한 개 이상 입력해 주세요.");Object.assign(d,{customerId:Number(fd.customerId),deliveryDate:fd.deliveryDate,routeOrder:Math.max(1,Number(fd.routeOrder)||1),coPackNote:String(fd.coPackNote||""),notes:String(fd.notes||""),previousBalance:Math.max(0,Number(fd.previousBalance)||0)});d.items=d.items.map(i=>({...i,requestedQty:Number(i.requestedQty)||0,actualWeight:i.category==="냉동제품"?null:(i.actualWeight===""?null:Number(i.actualWeight)),unit:i.category==="냉동제품"?"팩":i.unit,unitPrice:Number(i.unitPrice)||0,processingFeePerKg:i.category==="필렛 제품"?Number(i.processingFeePerKg)||0:0,tankNumber:Number(i.tankNumber)||0,rubberBandQuantity:i.rubberBand?Number(i.rubberBandQuantity)||0:0,rubberBandColor:i.rubberBand?i.rubberBandColor:""}));if(deliveryEditId){const x=state.deliveries.findIndex(v=>v.id===deliveryEditId);d.id=deliveryEditId;state.deliveries[x]=d}else{d.id=id();d.status="ready";d.createdAt=new Date().toISOString();state.deliveries.push(d)}save();$("#deliveryDialog").close();workDate=d.deliveryDate;render()}

    // 🚨 [1번, 2번 패치 완벽 수리]: 명세서 타이틀에 '서' 추가 및 수량이 0원이어도 제품 리스트가 무조건 보이도록 방어 해제
    function statementHTML(d,c,amount){
      const lines=d.items.map(i=>{
        const base=baseAmount(i);
        const w=i.actualWeight?Number(i.actualWeight):Number(i.requestedQty);
        const fee=i.category==="필렛 제품"?(w||0)*(Number(i.processingFeePerKg)||0):0;
        
        // !base&&!fee 여도 숨기지 않음. 점포 요청 내용은 무조건 명세서에 표기되도록 블록 생성
        let str = `<div><div class="line"><span>${esc(i.species)}${i.originCountry?` (원산지 ${esc(i.originCountry)})`:""} ${esc(itemQty(i))} ${Number(i.unitPrice)>0 ? `× ${money(i.unitPrice)}원/${i.category==="냉동제품"?"팩":"kg"}` : ""}</span><b>${money(base)}원</b></div>`;
        if(fee) {
            str += `<div class="line"><span style="color:#687985; font-size:11px;"> ↳ 필렛 작업비 ${w||0}kg × ${money(i.processingFeePerKg)}원</span><b>${money(fee)}원</b></div>`;
        }
        str += `</div>`;
        return str;
      }).join("");
      
      const due=amount+(Number(d.previousBalance)||0);
      return`<h1>${esc(c.name)} 거래명세서</h1><div class="statement-meta"><p><span>거래처명</span><b>${esc(c.name)}</b></p><p><span>납품처</span><b>${esc(c.deliveryPlace||"-")}</b></p><p class="address"><span>주소</span><b>${esc(c.address||"-")}</b></p><p><span>연락처</span><b>${esc(c.phone||"-")}</b></p><p><span>배송일</span><b>${esc(d.deliveryDate)}</b></p></div>${lines}<div class="subtotal"><span>당일 공급금액</span><b>${money(amount)}원</b></div>${d.previousBalance?`<div class="balance"><span>전날 미수금액</span><b>${money(d.previousBalance)}원</b></div>`:""}<div class="total"><span>최종 합계</span><b>${money(due)}원</b></div>${d.notes?`<div class="statement-note">${esc(d.notes)}</div>`:""}`
    }

    function updateCheck(type,itemId,checked){const d=state.deliveries.find(x=>x.id===selectedDeliveryId),list=type==="item"?d.items:d.boxes,obj=list.find(x=>x.id===itemId);if(obj)obj.checked=checked;save();openChecklist(selectedDeliveryId)}
    
    // 🚨 [3번 다운로드 로직 완벽 결합]: 팝업창을 띄워 2초 꾹 및 초록색 원터치 버튼을 통한 다이렉트 저장 지원

        const d = state.deliveries.find(x=>x.id===selectedDeliveryId);
        const storeName = d ? customerOf(d).name : "거래처";
        a.download = `${safeName(storeName)}_거래명세서_${dateLocal()}.png`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        alert("✅ 갤러리(사진첩)에 다운로드가 완료되었습니다!");
    };

    function exportExcel(){if(typeof XLSX==="undefined")return alert("Excel 모듈을 불러오지 못했습니다. 인터넷 연결 후 다시 눌러 주세요.");const rows=deliveries(),summary=[],detail=[];rows.forEach(d=>{const c=customerOf(d),daily=d.items.reduce((s,i)=>s+itemAmount(i),0);summary.push({배송순서:d.routeOrder,거래처명:c.name,납품처:c.deliveryPlace,주소:c.address,연락처:c.phone,"당일 공급금액":daily,"전날 미수금액":d.previousBalance,"최종 합계":daily+d.previousBalance,"박스 수":d.boxes.length,배송상태:d.status==="completed"?"배송 완료":"출차 준비",특이사항:[d.coPackNote,d.notes].filter(Boolean).join(" / ")});d.items.forEach((i,x)=>detail.push({배송일:d.deliveryDate,배송순서:d.routeOrder,거래처명:c.name,납품처:c.deliveryPlace,주소:c.address,연락처:c.phone,구분:i.category,"어종·품목":i.species,원산지:i.originCountry,주문수량:`${i.requestedQty}${i.unit}`,"실제중량(kg)":i.actualWeight??"",판매단가:i.unitPrice,"상품 금액":baseAmount(i),"작업비 kg단가":i.processingFeePerKg,"작업비 금액":i.category==="필렛 제품"?(i.actualWeight||0)*(i.processingFeePerKg||0):0,"전날 미수금액":x===0?d.previousBalance:"",상차위치:i.tankNumber?`${i.tankNumber}번 수조`:"박스·별도",고무밴드:i.rubberBand?`${i.rubberBandColor} ${i.rubberBandQuantity}개`:"",하차확인:i.checked?"확인 완료":"미확인"}))});const wb=XLSX.utils.book_new(),info=XLSX.utils.aoa_to_sheet([["회사명",state.profile.companyName],["배송담당자",state.profile.driverName],["차량 호차",state.profile.vehicleNumber],["배송일",workDate]]);XLSX.utils.book_append_sheet(wb,info,"기본정보");XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(summary),"거래처별 요약");XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(detail),"품목별 거래명세");XLSX.writeFile(wb,`${safeName(state.profile.companyName||"배송")}_거래명세표_${workDate}.xlsx`)}
    function backup(){const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`배송관리_백업_${dateLocal()}.json`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
    function restore(file){const reader=new FileReader();reader.onload=()=>{try{const d=JSON.parse(reader.result);if(!d.profile||!Array.isArray(d.customers)||!Array.isArray(d.deliveries))throw 0;if(confirm("현재 자료를 백업 파일 내용으로 교체할까요?")){state=d;save();render();alert("백업 자료를 복원했습니다.")}}catch{alert("올바른 배송관리 백업 파일이 아닙니다.")}};reader.readAsText(file)}

    document.addEventListener("click",e=>{
      const b=e.target.closest("button");if(!b)return;
      if(b.dataset.nav){setView(b.dataset.nav);return}
      if(b.hasAttribute("data-close")){b.closest("dialog").close();return}
      if(b.hasAttribute("data-new-customer"))return openCustomer();
      if(b.dataset.editCustomer)return openCustomer(Number(b.dataset.editCustomer));
      if(b.hasAttribute("data-reorder-customers")){customerReorder=!customerReorder;return renderCustomers()}
      if(b.dataset.moveCustomer)return moveCustomer(Number(b.dataset.moveCustomer),customers().findIndex(c=>c.id===Number(b.dataset.moveCustomer))+Number(b.dataset.dir));
      if(b.dataset.deleteCustomer){const cid=Number(b.dataset.deleteCustomer);if(state.deliveries.some(d=>d.customerId===cid))return alert("이 거래처의 배송 기록이 있어 삭제할 수 없습니다. 배송 기록을 먼저 삭제해 주세요.");if(confirm("이 거래처를 삭제할까요?")){state.customers=state.customers.filter(c=>c.id!==cid);normalizeCustomerOrder();save();$("#customerDialog").close();renderCustomers()}return}
      if(b.hasAttribute("data-new-delivery"))return openDelivery();
      if(b.dataset.openCheck)return openChecklist(Number(b.dataset.openCheck));
      if(b.hasAttribute("data-add-item")){syncDraft();$("#deliveryDialog")._draft.items.push(blankItem());return renderItemEditors()}
      if(b.dataset.removeItem!==undefined){syncDraft();const d=$("#deliveryDialog")._draft;if(d.items.length===1)return alert("품목은 한 개 이상 필요합니다.");d.items.splice(Number(b.dataset.removeItem),1);return renderItemEditors()}
      if(b.dataset.editDelivery){$("#checklistDialog").close();return openDelivery(Number(b.dataset.editDelivery))}
      if(b.dataset.deleteDelivery){if(confirm("오늘 배송 기록을 삭제할까요?")){state.deliveries=state.deliveries.filter(d=>d.id!==Number(b.dataset.deleteDelivery));save();$("#checklistDialog").close();render()}return}
      if(b.dataset.complete){const d=state.deliveries.find(x=>x.id===Number(b.dataset.complete));d.status="completed";d.completedAt=new Date().toISOString();save();$("#checklistDialog").close();render();return}
      if(b.dataset.cancelComplete){if(confirm("하차 완료를 취소하고 모든 체크를 초기화할까요?")){const d=state.deliveries.find(x=>x.id===Number(b.dataset.cancelComplete));d.status="ready";d.completedAt=null;d.items.forEach(i=>i.checked=false);d.boxes.forEach(x=>x.checked=false);save();openChecklist(d.id)}return}
      if(b.hasAttribute("data-print"))return window.print();
      if(b.dataset.image)return void saveStatementImage(b.dataset.image);
      if(b.hasAttribute("data-export-excel"))return exportExcel();
      if(b.hasAttribute("data-backup"))return backup();
      if(b.hasAttribute("data-restore"))return $("#restoreInput").click();
    });
    
    document.addEventListener("submit",e=>{
      e.preventDefault();
      if(e.target.id==="customerForm")saveCustomer(e.target);
      if(e.target.id==="deliveryForm")saveDelivery(e.target);
      if(e.target.id==="settingsForm"){
        const fd=Object.fromEntries(new FormData(e.target));
        state.profile={companyName:String(fd.companyName).trim(),driverName:String(fd.driverName).trim(),vehicleNumber:String(fd.vehicleNumber).trim()};
        save();renderSettings();alert("회사·차량 정보를 저장했습니다.");
      }
    });
    
    // 🚨 1번 인풋 자동계산 캐치 리스너 결합
    document.addEventListener("input", e=>{
      if(e.target.closest("#deliveryForm")) calcLiveTotal();
    });

    document.addEventListener("change",e=>{
      if(e.target.id==="workDate"){workDate=e.target.value||dateLocal();render()}
      if(e.target.dataset.customerPosition)return moveCustomer(Number(e.target.dataset.customerPosition),Number(e.target.value)-1);
      if(e.target.id==="boxCount"){syncDraft();const d=$("#deliveryDialog")._draft,n=Math.max(0,Math.min(20,Number(e.target.value)||0));d.boxes=Array.from({length:n},(_,i)=>d.boxes[i]||{id:id(),boxNumber:i+1,contents:"",checked:false});d.boxes.forEach((b,i)=>b.boxNumber=i+1);renderBoxEditors()}
      const row=e.target.closest("[data-item-index]");if(row&&(e.target.dataset.item==="category"||e.target.dataset.itemCheck!==undefined)){syncDraft();renderItemEditors()}
      if(e.target.dataset.checkItem)return updateCheck("item",Number(e.target.dataset.checkItem),e.target.checked);
      if(e.target.dataset.checkBox)return updateCheck("box",Number(e.target.dataset.checkBox),e.target.checked);
      if(e.target.id==="restoreInput"&&e.target.files[0])restore(e.target.files[0]);
    });
    
    render();
  })();
  </script>
</body>
</html>
